<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MiniExcel Infinite Scale Canvas</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: Arial, sans-serif; background-color: #f3f3f3; overflow: hidden; }
        
        /* Контейнер для прокрутки */
        .viewport-container { width: 100%; height: 100%; overflow: auto; -webkit-overflow-scrolling: touch; position: relative; }
        
        /* Слой трансформации, который позволяет сжимать таблицу до любых размеров */
        .zoom-layer {
            transform-origin: 0 0;
            width: max-content;
            height: max-content;
            transition: transform 0.05s ease-out;
        }
        
        table { border-collapse: collapse; table-layout: fixed; background: white; box-sizing: border-box; }
        
        th, td { 
            border: 0.5px solid #d4d4d4; 
            padding: 0; 
            font-size: 11px; 
            outline: none; 
            vertical-align: middle; 
            position: relative; 
            overflow: visible; 
            box-sizing: border-box; 
        }
        
        th { background-color: #f1f1f1; font-weight: bold; text-align: center; color: #444; position: sticky; top: 0; z-index: 10; user-select: none; height: 22px; }
        tr th:first-child { position: sticky; left: 0; z-index: 15; background-color: #f1f1f1; }
        
        .row-number-cell { background-color: #f9f9f9; text-align: center; font-weight: bold; color: #666; position: sticky; left: 0; z-index: 5; }
        
        .cell-content {
            position: absolute;
            left: 4px;
            top: 0;
            height: 100%;
            display: flex;
            align-items: center;
            white-space: nowrap;
            overflow: visible;
            z-index: 2;
            pointer-events: none; 
            width: max-content;
            background: transparent;
        }

        td:focus { outline: 1.5px solid #107c41 !important; z-index: 20; background-color: #f3f9f5 !important; }
        .hidden-merged-cell { display: none; }
    </style>
</head>
<body>

<div class="viewport-container" id="scroll-view">
    <div class="zoom-layer" id="zoom-container">
        <table id="excel-table"></table>
    </div>
</div>

<script>
    let currentData = [];
    let defaultRows = 50;
    let defaultCols = 15;
    
    // Переменные для кастомного зума
    let currentScale = 1.0;
    let startTouchDist = 0;
    let startScale = 1.0;

    function createEmptyGrid() {
        const table = document.getElementById('excel-table');
        table.innerHTML = '';
        let colGroup = document.createElement('colgroup');
        let colFirst = document.createElement('col'); colFirst.style.width = "35px"; colGroup.appendChild(colFirst);
        for (let c = 0; c < defaultCols; c++) {
            let col = document.createElement('col'); col.style.width = "75px"; colGroup.appendChild(col);
        }
        table.appendChild(colGroup);

        let headerRow = document.createElement('tr');
        let emptyTh = document.createElement('th'); headerRow.appendChild(emptyTh);
        for (let c = 0; c < defaultCols; c++) {
            let th = document.createElement('th'); th.innerText = String.fromCharCode(65 + c); headerRow.appendChild(th);
        }
        table.appendChild(headerRow);

        for (let r = 0; r < defaultRows; r++) {
            let tr = document.createElement('tr'); tr.style.height = "20px";
            let rowTh = document.createElement('td'); rowTh.className = "row-number-cell"; rowTh.innerText = r + 1; tr.appendChild(rowTh);
            currentData[r] = [];
            for (let c = 0; c < defaultCols; c++) {
                let td = document.createElement('td'); td.contentEditable = true; td.dataset.row = r; td.dataset.col = c; currentData[r][c] = "";
                td.addEventListener('blur', function() { currentData[this.dataset.row][this.dataset.col] = this.innerText; });
                tr.appendChild(td);
            }
            table.appendChild(tr);
        }
        initPinchZoom();
    }

    function loadExcelFromBytes(base64Data) {
        try {
            const binaryString = atob(base64Data);
            const len = binaryString.length;
            const bytes = new Uint8Array(len);
            for (let i = 0; i < len; i++) { bytes[i] = binaryString.charCodeAt(i); }
            const decodedString = new TextDecoder('utf-8').decode(bytes);
            
            const payload = JSON.parse(decodedString);
            const rows = payload.matrix;
            const merges = payload.merges || [];
            const widths = payload.widths || [];
            const heights = payload.heights || [];
            
            const table = document.getElementById('excel-table');
            table.innerHTML = '';
            
            if (!rows || rows.length === 0) { createEmptyGrid(); return; }
            currentData = [];
            let colsCount = rows[0].length;

            let colGroup = document.createElement('colgroup');
            let colFirst = document.createElement('col'); colFirst.style.width = "40px"; colGroup.appendChild(colFirst);
            for (let c = 0; c < colsCount; c++) {
                let col = document.createElement('col');
                col.style.width = (widths[c] || 80) + "px";
                colGroup.appendChild(col);
            }
            table.appendChild(colGroup);

            let headerRow = document.createElement('tr');
            let firstTh = document.createElement('th'); headerRow.appendChild(firstTh);
            for (let c = 0; c < colsCount; c++) {
                let th = document.createElement('th'); th.innerText = String.fromCharCode(65 + c); headerRow.appendChild(th);
            }
            table.appendChild(headerRow);

            let mergeMap = {};
            merges.forEach(m => {
                for (let r = m.sr; r <= m.er; r++) {
                    for (let c = m.sc; c <= m.ec; c++) {
                        if (r === m.sr && c === m.sc) {
                            mergeMap[`${r}_${c}`] = { isMain: true, rowspan: (m.er - m.sr) + 1, colspan: (m.ec - m.sc) + 1 };
                        } else { mergeMap[`${r}_${c}`] = { isChild: true }; }
                    }
                }
            });

            for (let r = 0; r < rows.length; r++) {
                let tr = document.createElement('tr');
                tr.style.height = (heights[r] || 22) + "px";

                let rowTh = document.createElement('td'); rowTh.className = "row-number-cell"; rowTh.innerText = r + 1; tr.appendChild(rowTh);
                currentData[r] = [];

                for (let c = 0; c < colsCount; c++) {
                    let cellData = rows[r][c];
                    let td = document.createElement('td');
                    td.contentEditable = true; td.dataset.row = r; td.dataset.col = c;
                    let textValue = (cellData && cellData.v !== undefined) ? cellData.v : "";
                    currentData[r][c] = textValue;

                    if (textValue !== "") {
                        let contentDiv = document.createElement('div');
                        contentDiv.className = "cell-content"; contentDiv.innerText = textValue; td.appendChild(contentDiv);
                    }

                    if (cellData) {
                        if (cellData.bg) td.style.backgroundColor = cellData.bg;
                        if (cellData.color) td.style.color = cellData.color;
                        if (cellData.bold) td.style.fontWeight = "bold";
                        if (cellData.italic) td.style.fontStyle = "italic";
                    }

                    td.addEventListener('blur', function() {
                        let innerText = this.innerText; currentData[this.dataset.row][this.dataset.col] = innerText;
                        this.innerHTML = "";
                        if (innerText !== "") {
                            let contentDiv = document.createElement('div'); contentDiv.className = "cell-content"; contentDiv.innerText = innerText; this.appendChild(contentDiv);
                        }
                    });
                    td.addEventListener('focus', function() { this.innerText = currentData[this.dataset.row][this.dataset.col]; });

                    let mergeInfo = mergeMap[`${r}_${c}`];
                    if (mergeInfo) {
                        if (mergeInfo.isMain) {
                            if (mergeInfo.rowspan > 1) td.rowSpan = mergeInfo.rowspan;
                            if (mergeInfo.colspan > 1) td.colSpan = mergeInfo.colspan;
                        } else if (mergeInfo.isChild) { td.classList.add('hidden-merged-cell'); }
                    }
                    tr.appendChild(td);
                }
                table.appendChild(tr);
            }
            initPinchZoom();
            AndroidBridge.onStatus("Файл успешно визуализирован!");
        } catch (e) { AndroidBridge.onStatus("Ошибка отрисовки: " + e.message); }
    }

    // РЕАЛИЗАЦИЯ БЕСКОНЕЧНОГО ЗУМА ЧЕРЕЗ ТРАНСФОРМАЦИЮ СЛОЯ
    function initPinchZoom() {
        const scrollView = document.getElementById('scroll-view');
        const zoomContainer = document.getElementById('zoom-container');

        scrollView.addEventListener('touchstart', function(e) {
            if (e.touches.length === 2) {
                e.preventDefault();
                startTouchDist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
                startScale = currentScale;
            }
        }, { passive: false });

        scrollView.addEventListener('touchmove', function(e) {
            if (e.touches.length === 2) {
                e.preventDefault();
                const dist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
                if (startTouchDist > 0) {
                    let scaleFactor = dist / startTouchDist;
                    let targetScale = startScale * scaleFactor;
                    
                    // Порог зума: от супер-миниатюры (0.15) до увеличения (3.0)
                    if (targetScale < 0.15) targetScale = 0.15;
                    if (targetScale > 3.0) targetScale = 3.0;
                    
                    currentScale = targetScale;
                    zoomContainer.style.transform = `scale(${currentScale})`;
                }
            }
        }, { passive: false });
        
        scrollView.addEventListener('touchend', function(e) { if (e.touches.length < 2) { startTouchDist = 0; } });
    }

    function exportExcelToAndroid() {
        try {
            const jsonString = JSON.stringify(currentData);
            const encoder = new TextEncoder(); const bytes = encoder.encode(jsonString);
            let binary = ''; for (let i = 0; i < bytes.byteLength; i++) { binary += String.fromCharCode(bytes[i]); }
            AndroidBridge.saveFileData(btoa(binary));
        } catch (e) { AndroidBridge.onStatus("Ошибка экспорта: " + e.message); }
    }

    window.onload = createEmptyGrid;
</script>
</body>
</html>
