<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MiniExcel Core</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortune-sheet/variant@1.0.0/dist/index.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/@fortune-sheet/variant@1.0.0/dist/index.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; }
        #sheet-container { width: 100%; height: 100%; }
    </style>
</head>
<body>
<div id="sheet-container"></div>
<script>
    let sheetInstance = null;
    let originalWorkbookRef = null;

    function loadExcelFromBytes(base64Data) {
        try {
            const binaryString = atob(base64Data);
            const len = binaryString.length;
            const bytes = new Uint8Array(len);
            for (let i = 0; i < len; i++) {
                bytes[i] = binaryString.charCodeAt(i);
            }
            originalWorkbookRef = XLSX.read(bytes.buffer, { type: 'array', cellStyles: true, cellNF: true });
            const firstSheetName = originalWorkbookRef.SheetNames[0];
            const worksheet = originalWorkbookRef.Sheets[firstSheetName];
            const data = fortune.mockData(worksheet); 
            document.getElementById('sheet-container').innerHTML = '';
            sheetInstance = fortune.createSheet({
                container: 'sheet-container',
                data: [{ name: firstSheetName, celldata: data }],
                showinfobar: false,
                allowUpdate: true
            });
            AndroidBridge.onStatus("Файл успешно визуализирован!");
        } catch (e) {
            AndroidBridge.onStatus("Ошибка парсинга в JS: " + e.message);
        }
    }

    function exportExcelToAndroid() {
        try {
            if (!sheetInstance || !originalWorkbookRef) {
                AndroidBridge.onStatus("Нет данных для сохранения");
                return;
            }
            const sheetData = sheetInstance.getSheetData();
            const firstSheetName = originalWorkbookRef.SheetNames[0];
            const updatedWorksheet = fortune.exportToWorksheet(sheetData);
            originalWorkbookRef.Sheets[firstSheetName] = updatedWorksheet;
            const wbout = XLSX.write(originalWorkbookRef, { bookType: 'xlsx', type: 'array', cellStyles: true });
            const binary = String.fromCharCode.apply(null, new Uint8Array(wbout));
            const base64 = btoa(binary);
            AndroidBridge.saveFileData(base64);
        } catch (e) {
            AndroidBridge.onStatus("Ошибка сборки файла в JS: " + e.message);
        }
    }

    window.onload = function() {
        if (!sheetInstance) {
            sheetInstance = fortune.createSheet({
                container: 'sheet-container',
                data: [{ name: 'Sheet1', row: 50, column: 15 }],
                showinfobar: false
            });
        }
    }
</script>
</body>
</html>
