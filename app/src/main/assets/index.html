<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MiniExcel Rock Solid Layout</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: Arial, sans-serif; background-color: #f3f3f3; overflow: hidden; }
        
        /* Главное окно приложения */
        .app-container { display: flex; width: 100%; height: 100%; position: relative; }
        
        /* 1. ИЗОЛИРОВАННАЯ КОЛОНКА НОМЕРОВ СТРОК (Вне зоны зума, жестко слева) */
        .sidebar-numbers {
            width: 38px;
            height: 100%;
            background-color: #f1f1f1;
            border-right: 1.5px solid #c0c0c0;
            overflow: hidden; /* Скроллится только программно синхронно с таблицей */
            z-index: 100;
            box-sizing: border-box;
        }
        
        .sidebar-header {
            height: 23px;
            background-color: #e6e6e6;
            border-bottom: 0.5px solid #d4d4d4;
        }
        
        .sidebar-row {
            height: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: bold;
            color: #666;
            border-bottom: 0.5px solid #d4d4d4;
            box-sizing: border-box;
            background-color: #f9f9f9;
        }
        
        /* 2. ОСНОВНАЯ ОБЛАСТЬ ТАБЛИЦЫ С ЗУМОМ И СКРОЛЛОМ */
        .table-viewport {
            flex: 1;
            height: 100%;
            overflow: auto;
            -webkit-overflow-scrolling: touch;
            position: relative;
        }
        
        .zoom-container {
            transform-origin: 0 0;
            width: max-content;
            height: max-content;
        }
        
        table { border-collapse: collapse; table-layout: fixed; background: white; box-sizing: border-box; }
        
        th, td { 
            border: 0.5px solid #d4d4d4; 
            padding: 0 5px; 
            font-size: 11px; 
            outline: none; 
            vertical-align: middle; 
            box-sizing: border-box; 
            height: 22px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: clip;
        }
        
        th { background-color: #f1f1f1; font-weight: bold; text-align: center; color: #444; user-select: none; position: sticky; top: 0; z-index: 10; }
        
        td:focus { outline: 1.5px solid #107c41 !important; z-index: 20; background-color: #f3f9f5 !important; }
        .hidden-merged-cell { display: none; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="sidebar-numbers" id="sidebar-scroll">
        <div class="sidebar-header"></div>
        <div id="sidebar-rows-container"></div>
    </div>

    <div class="table-viewport" id="main-viewport">
        <div class="zoom-container" id="zoom-layer">
            <table id="excel-table"></table>
        </div>
    </div>
</div>

<script>
    let currentData = [];
    let defaultRows = 50;
    let defaultCols = 15;
    
    let currentScale = 1.0;
    let startTouchDist = 0;
    let startScale = 1.0;

    function createEmptyGrid() {
        buildLayout(defaultRows, defaultCols, [], [], []);
    }

    function loadExcelFromBytes(base64Data) {
        try {
            const binaryString = atob(base64Data);
            const len = binaryString.length;
            const bytes = new Uint8Array(len);
            for (let i = 0; i < len; i++) { bytes[i] = binaryString.charCodeAt(i); }
            const decodedString = new TextDecoder('utf-8').decode(bytes);
            
            const payload = JSON.parse(decodedString);
            buildLayout(payload.matrix.length, payload.matrix[0].length, payload.matrix, payload.merges || [], payload.widths || [], payload.heights || []);
            AndroidBridge.onStatus("Файл успешно визуализирован!");
        } catch (e) { AndroidBridge.onStatus("Ошибка отрисовки: " + e.message); }
    }

    function buildLayout(rowCount, colCount, matrix, merges, widths, heights) {
        const sidebarContainer = document.getElementById('sidebar-rows-container');
        const table = document.getElementById('excel-table');
        
        sidebarContainer.innerHTML = '';
        table.innerHTML = '';
        currentData = [];

        // 1. Генерируем железные нативные номера строк слева
        for (let r = 0; r < rowCount; r++) {
            let rowDiv = document.createElement('div');
            rowDiv.className = "sidebar-row";
            rowDiv.id = `side-row-${r}`;
            rowDiv.innerText = r + 1;
            // Синхронизируем высоту строки с Excel
            let rHeight = heights[r] || 22;
            rowDiv.style.height = rHeight + "px";
            sidebarContainer.appendChild(rowDiv);
        }

        // 2. Строим саму таблицу
        let colGroup = document.createElement('colgroup');
        for (let c = 0; c < colCount; c++) {
            let col = document.createElement('col');
            col.style.width = (widths[c] || 65) + "px";
            colGroup.appendChild(col);
        }
        table.appendChild(colGroup);

        let headerRow = document.createElement('tr');
        for (let c = 0; c < colCount; c++) {
            let th = document.createElement('th');
            th.innerText = String.fromCharCode(65 + c);
            headerRow.appendChild(th);
        }
        table.appendChild(headerRow);

        let mergeMap = {};
        merges.forEach(m => {
            for (let r = m.sr; r <= m.er; r++) {
                for (let c = m.sc; c <= m.ec; c++) {
                    if (r === m.sr && c === m.sc) {
                        mergeMap[`${r}_${c}`] = { isMain: true, rowspan: (m.er - m.sr) + 1, colspan: (m.ec - m.sc) + 1 };
                    } else { mergeMap[`${r}_${c}`] = { isChild: true }; }
                }
            }
        });

        for (let r = 0; r < rowCount; r++) {
            let tr = document.createElement('tr');
            tr.style.height = (heights[r] || 22) + "px";
            currentData[r] = [];

            for (let c = 0; c < colCount; c++) {
                let cellData = matrix[r] ? matrix[r][c] : null;
                let td = document.createElement('td');
                td.contentEditable = true;
                td.dataset.row = r;
                td.dataset.col = c;
                
                let textValue = (cellData && cellData.v !== undefined) ? cellData.v : "";
                currentData[r][c] = textValue;
                td.innerText = textValue;

                if (cellData) {
                    if (cellData.bg) td.style.backgroundColor = cellData.bg;
                    if (cellData.color) td.style.color = cellData.color;
                    if (cellData.bold) td.style.fontWeight = "bold";
                    if (cellData.italic) td.style.fontStyle = "italic";
                }

                // ЧИСТЫЙ ЭКСПОРТ ДАННЫХ ПРИ СНЯТИИ ФОКУСА
                td.addEventListener('blur', function() {
                    // Заменяем невидимые символы переноса строк WebView на чистый текст
                    let cleanText = this.innerText.replace(/\n/g, '').trim();
                    currentData[this.dataset.row][this.dataset.col] = cleanText;
                });

                let mergeInfo = mergeMap[`${r}_${c}`];
                if (mergeInfo) {
                    if (mergeInfo.isMain) {
                        if (mergeInfo.rowspan > 1) td.rowSpan = mergeInfo.rowspan;
                        if (mergeInfo.colspan > 1) td.colSpan = mergeInfo.colspan;
                    } else if (mergeInfo.isChild) { td.classList.add('hidden-merged-cell'); }
                }
                tr.appendChild(td);
            }
            table.appendChild(tr);
        }
        initPinchAndHardwareScroll();
    }

    // АППАРАТНАЯ СИНХРОНИЗАЦИЯ СКРОЛЛА И КОРРЕКТНЫЙ ЗУМ
    function initPinchAndHardwareScroll() {
        const mainViewport = document.getElementById('main-viewport');
        const sidebarScroll = document.getElementById('sidebar-scroll');
        const zoomLayer = document.getElementById('zoom-layer');

        // Вертикальный скролл привязывается пиксель в пиксель БЕЗ задержек
        mainViewport.onscroll = function() {
            sidebarScroll.scrollTop = mainViewport.scrollTop;
        };

        mainViewport.addEventListener('touchstart', function(e) {
            if (e.touches.length === 2) {
                e.preventDefault();
                startTouchDist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
                startScale = currentScale;
            }
        }, { passive: false });

        mainViewport.addEventListener('touchmove', function(e) {
            if (e.touches.length === 2) {
                e.preventDefault();
                const dist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
                if (startTouchDist > 0) {
                    let scaleFactor = dist / startTouchDist;
                    let targetScale = startScale * scaleFactor;
                    
                    if (targetScale < 0.3) targetScale = 0.3;
                    if (targetScale > 2.5) targetScale = 2.5;
                    
                    currentScale = targetScale;
                    zoomLayer.style.transform = `scale(${currentScale})`;
                    
                    // Динамически масштабируем высоту номеров строк в левой панели под масштаб таблицы
                    const rows = document.querySelectorAll('.sidebar-row');
                    rows.forEach(row => {
                        row.style.transform = `scaleY(${currentScale})`;
                        row.style.transformOrigin = "0 0";
                    });
                }
            }
        }, { passive: false });
        
        mainViewport.addEventListener('touchend', function(e) { if (e.touches.length < 2) { startTouchDist = 0; } });
    }

    function exportExcelToAndroid() {
        try {
            const jsonString = JSON.stringify(currentData);
            const encoder = new TextEncoder(); const bytes = encoder.encode(jsonString);
            let binary = ''; for (let i = 0; i < bytes.byteLength; i++) { binary += String.fromCharCode(bytes[i]); }
            AndroidBridge.saveFileData(btoa(binary));
        } catch (e) { AndroidBridge.onStatus("Ошибка экспорта: " + e.message); }
    }

    window.onload = createEmptyGrid;
</script>
</body>
</html>
