<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiniExcel Native Grid</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: Arial, sans-serif; background-color: #f3f3f3; }
        
        .viewport-container { width: 100%; height: 100%; overflow: auto; -webkit-overflow-scrolling: touch; }
        
        table { border-collapse: collapse; table-layout: fixed; background: white; box-sizing: border-box; width: max-content; }
        
        th, td { 
            border: 0.5px solid #d4d4d4; 
            padding: 0 4px; 
            font-size: 11px; 
            outline: none; 
            vertical-align: middle; 
            box-sizing: border-box; 
            height: 22px;
            white-space: nowrap;
            overflow: hidden;
        }
        
        /* Нативный аппаратный sticky сверху */
        th { background-color: #f1f1f1; font-weight: bold; text-align: center; color: #444; user-select: none; position: sticky; top: 0; z-index: 10; }
        
        /* Нативный аппаратный sticky слева: СТОИТ КАК ВКОПАННЫЙ, без пружин */
        .row-number-cell { 
            background-color: #f1f1f1 !important; 
            text-align: center; 
            font-weight: bold; 
            color: #666; 
            font-size: 10px;
            user-select: none;
            position: sticky;
            left: 0;
            z-index: 5;
        }
        
        /* Левый верхний угол */
        tr:first-child th:first-child { z-index: 15; position: sticky; left: 0; }

        td:focus { outline: 1.5px solid #107c41 !important; z-index: 20; background-color: #f3f9f5 !important; }
        .hidden-merged-cell { display: none; }
    </style>
</head>
<body>

<div class="viewport-container">
    <table id="excel-table"></table>
</div>

<script>
    let currentData = [];
    let defaultRows = 50;
    let defaultCols = 15;

    function createEmptyGrid() {
        const table = document.getElementById('excel-table');
        table.innerHTML = '';
        currentData = [];

        let headerRow = document.createElement('tr');
        let emptyTh = document.createElement('th'); emptyTh.style.width = "40px"; headerRow.appendChild(emptyTh);
        for (let c = 0; c < defaultCols; c++) {
            let th = document.createElement('th'); th.innerText = String.fromCharCode(65 + c); th.style.width = "75px"; headerRow.appendChild(th);
        }
        table.appendChild(headerRow);

        for (let r = 0; r < defaultRows; r++) {
            let tr = document.createElement('tr'); tr.style.height = "22px";
            let rowTh = document.createElement('td'); rowTh.className = "row-number-cell"; rowTh.innerText = r + 1; tr.appendChild(rowTh);
            currentData[r] = [];
            for (let c = 0; c < defaultCols; c++) {
                let td = document.createElement('td'); td.contentEditable = true; td.dataset.row = r; td.dataset.col = c; currentData[r][c] = "";
                td.addEventListener('blur', function() { currentData[this.dataset.row][this.dataset.col] = this.innerText.trim(); });
                tr.appendChild(td);
            }
            table.appendChild(tr);
        }
    }

    function loadExcelFromBytes(base64Data) {
        try {
            const binaryString = atob(base64Data);
            const len = binaryString.length;
            const bytes = new Uint8Array(len);
            for (let i = 0; i < len; i++) { bytes[i] = binaryString.charCodeAt(i); }
            const decodedString = new TextDecoder('utf-8').decode(bytes);
            
            const payload = JSON.parse(decodedString);
            const rows = payload.matrix;
            const merges = payload.merges || [];
            const widths = payload.widths || [];
            const heights = payload.heights || [];
            
            const table = document.getElementById('excel-table');
            table.innerHTML = '';
            
            if (!rows || rows.length === 0) { createEmptyGrid(); return; }
            currentData = [];
            let colsCount = rows[0].length;

            let colGroup = document.createElement('colgroup');
            let colFirst = document.createElement('col'); colFirst.style.width = "40px"; colGroup.appendChild(colFirst);
            for (let c = 0; c < colsCount; c++) {
                let col = document.createElement('col');
                col.style.width = (widths[c] || 65) + "px";
                colGroup.appendChild(col);
            }
            table.appendChild(colGroup);

            let headerRow = document.createElement('tr');
            let firstTh = document.createElement('th'); headerRow.appendChild(firstTh);
            for (let c = 0; c < colsCount; c++) {
                let th = document.createElement('th'); th.innerText = String.fromCharCode(65 + c); headerRow.appendChild(th);
            }
            table.appendChild(headerRow);

            let mergeMap = {};
            merges.forEach(m => {
                for (let r = m.sr; r <= m.er; r++) {
                    for (let c = m.sc; c <= m.ec; c++) {
                        if (r === m.sr && c === m.sc) {
                            mergeMap[`${r}_${c}`] = { isMain: true, rowspan: (m.er - m.sr) + 1, colspan: (m.ec - m.sc) + 1 };
                        } else { mergeMap[`${r}_${c}`] = { isChild: true }; }
                    }
                }
            });

            for (let r = 0; r < rows.length; r++) {
                let tr = document.createElement('tr');
                tr.style.height = (heights[r] || 22) + "px";

                let rowTh = document.createElement('td'); rowTh.className = "row-number-cell"; rowTh.innerText = r + 1; tr.appendChild(rowTh);
                currentData[r] = [];

                for (let c = 0; c < colsCount; c++) {
                    let cellData = rows[r][c];
                    let td = document.createElement('td');
                    td.contentEditable = true; td.dataset.row = r; td.dataset.col = c;
                    
                    let textValue = (cellData && cellData.v !== undefined) ? cellData.v : "";
                    currentData[r][c] = textValue;
                    td.innerText = textValue;

                    if (cellData) {
                        if (cellData.bg) td.style.backgroundColor = cellData.bg;
                        if (cellData.color) td.style.color = cellData.color;
                        if (cellData.bold) td.style.fontWeight = "bold";
                        if (cellData.italic) td.style.fontStyle = "italic";
                    }

                    td.addEventListener('blur', function() {
                        let cleanText = this.innerText.replace(/\n/g, '').replace(/\r/g, '').trim();
                        currentData[this.dataset.row][this.dataset.col] = cleanText;
                    });

                    let mergeInfo = mergeMap[`${r}_${c}`];
                    if (mergeInfo) {
                        if (mergeInfo.isMain) {
                            if (mergeInfo.rowspan > 1) td.rowSpan = mergeInfo.rowspan;
                            if (mergeInfo.colspan > 1) td.colSpan = mergeInfo.colspan;
                        } else if (mergeInfo.isChild) { td.classList.add('hidden-merged-cell'); }
                    }
                    tr.appendChild(td);
                }
                table.appendChild(tr);
            }
            AndroidBridge.onStatus("Файл успешно визуализирован!");
        } catch (e) { AndroidBridge.onStatus("Ошибка отрисовки: " + e.message); }
    }

    function exportExcelToAndroid() {
        try {
            const jsonString = JSON.stringify(currentData);
            const encoder = new TextEncoder(); const bytes = encoder.encode(jsonString);
            let binary = ''; for (let i = 0; i < bytes.byteLength; i++) { binary += String.fromCharCode(bytes[i]); }
            AndroidBridge.saveFileData(btoa(binary));
        } catch (e) { AndroidBridge.onStatus("Ошибка экспорта: " + e.message); }
    }

    window.onload = createEmptyGrid;
</script>
</body>
</html>
