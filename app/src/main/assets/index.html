<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MiniExcel Advanced Engine</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #fff; }
        .table-wrapper { width: 100%; height: 100%; overflow: auto; -webkit-overflow-scrolling: touch; }
        table { border-collapse: collapse; table-layout: fixed; width: max-content; background: white; }
        th, td { border: 1px solid #d4d4d4; padding: 6px 10px; font-size: 14px; min-width: 90px; height: 28px; outline: none; text-align: left; vertical-align: middle; word-break: break-word; }
        th { background-color: #f1f1f1; font-weight: bold; text-align: center; color: #444; position: sticky; top: 0; z-index: 2; user-select: none; }
        tr th:first-child { position: sticky; left: 0; z-index: 3; background-color: #f1f1f1; }
        td:first-child { background-color: #f9f9f9; text-align: center; font-weight: bold; color: #666; position: sticky; left: 0; z-index: 1; user-select: none; }
        td:focus { border: 2px solid #107c41 !important; background-color: #f3f9f5; }
        .hidden-merged-cell { display: none; } /* Скрываем ячейки внутри объединенных областей */
    </style>
</head>
<body>

<div class="table-wrapper">
    <table id="excel-table"></table>
</div>

<script>
    let currentData = [];
    let maxRows = 60;
    let maxCols = 20;

    function createEmptyGrid() {
        const table = document.getElementById('excel-table');
        table.innerHTML = '';
        let headerRow = document.createElement('tr');
        let emptyTh = document.createElement('th');
        headerRow.appendChild(emptyTh);
        for (let c = 0; c < maxCols; c++) {
            let th = document.createElement('th');
            th.innerText = String.fromCharCode(65 + c);
            headerRow.appendChild(th);
        }
        table.appendChild(headerRow);

        for (let r = 0; r < maxRows; r++) {
            let tr = document.createElement('tr');
            let rowTh = document.createElement('td');
            rowTh.innerText = r + 1;
            tr.appendChild(rowTh);
            currentData[r] = [];
            for (let c = 0; c < maxCols; c++) {
                let td = document.createElement('td');
                td.contentEditable = true;
                td.dataset.row = r;
                td.dataset.col = c;
                currentData[r][c] = "";
                td.addEventListener('blur', function() {
                    currentData[this.dataset.row][this.dataset.col] = this.innerText;
                });
                tr.appendChild(td);
            }
            table.appendChild(tr);
        }
    }

    // Принимает объект { matrix: [...], merges: [...] }
    function loadExcelFromBytes(base64Data) {
        try {
            const binaryString = atob(base64Data);
            const len = binaryString.length;
            const bytes = new Uint8Array(len);
            for (let i = 0; i < len; i++) { bytes[i] = binaryString.charCodeAt(i); }
            const decodedString = new TextDecoder('utf-8').decode(bytes);
            
            const payload = JSON.parse(decodedString);
            const rows = payload.matrix;
            const merges = payload.merges || []; // Массив объектов {sr, er, sc, ec}
            
            const table = document.getElementById('excel-table');
            table.innerHTML = '';
            
            if (!rows || rows.length === 0) {
                createEmptyGrid();
                return;
            }

            currentData = rows;
            let colsCount = rows[0].length;

            // Заголовки
            let headerRow = document.createElement('tr');
            headerRow.appendChild(document.createElement('th'));
            for (let c = 0; c < colsCount; c++) {
                let th = document.createElement('th');
                th.innerText = String.fromCharCode(65 + c);
                headerRow.appendChild(th);
            }
            table.appendChild(headerRow);

            // Создаем карту занятых ячеек для корректного скрытия при слиянии
            let mergeMap = {};
            merges.forEach(m => {
                for (let r = m.sr; r <= m.er; r++) {
                    for (let c = m.sc; c <= m.ec; c++) {
                        if (r === m.sr && c === m.sc) {
                            mergeMap[`${r}_${c}`] = { isMain: true, rowspan: (m.er - m.sr) + 1, colspan: (m.ec - m.sc) + 1 };
                        } else {
                            mergeMap[`${r}_${c}`] = { isChild: true };
                        }
                    }
                }
            });

            // Отрисовка сетки
            for (let r = 0; r < rows.length; r++) {
                let tr = document.createElement('tr');
                let rowTh = document.createElement('td');
                rowTh.innerText = r + 1;
                tr.appendChild(rowTh);

                for (let c = 0; c < colsCount; c++) {
                    let td = document.createElement('td');
                    td.contentEditable = true;
                    td.dataset.row = r;
                    td.dataset.col = c;
                    td.innerText = rows[r][c] || "";

                    td.addEventListener('blur', function() {
                        currentData[this.dataset.row][this.dataset.col] = this.innerText;
                    });

                    // Умное управление объединением ячеек на уровне HTML
                    let mergeInfo = mergeMap[`${r}_${c}`];
                    if (mergeInfo) {
                        if (mergeInfo.isMain) {
                            if (mergeInfo.rowspan > 1) td.rowSpan = mergeInfo.rowspan;
                            if (mergeInfo.colspan > 1) td.colSpan = mergeInfo.colspan;
                        } else if (mergeInfo.isChild) {
                            td.classList.add('hidden-merged-cell'); // Прячем поглощенные ячейки
                        }
                    }

                    tr.appendChild(td);
                }
                table.appendChild(tr);
            }
            AndroidBridge.onStatus("Файл успешно визуализирован!");
        } catch (e) {
            AndroidBridge.onStatus("Ошибка отрисовки: " + e.message);
        }
    }

    function exportExcelToAndroid() {
        try {
            const jsonString = JSON.stringify(currentData);
            const encoder = new TextEncoder();
            const bytes = encoder.encode(jsonString);
            let binary = '';
            for (let i = 0; i < bytes.byteLength; i++) { binary += String.fromCharCode(bytes[i]); }
            AndroidBridge.saveFileData(btoa(binary));
        } catch (e) {
            AndroidBridge.onStatus("Ошибка экспорта: " + e.message);
        }
    }

    window.onload = createEmptyGrid;
</script>
</body>
</html>
