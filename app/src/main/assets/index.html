<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, minimum-scale=0.1, maximum-scale=5.0, user-scalable=yes">
    <title>MiniExcel Pro Grid</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; background-color: #fff; }
        .table-wrapper { width: 100%; height: 100%; overflow: auto; -webkit-overflow-scrolling: touch; }
        table { border-collapse: collapse; table-layout: fixed; width: max-content; background: white; }
        
        /* Пропорциональные размеры ячеек по умолчанию */
        th, td { border: 0.5px solid #d4d4d4; padding: 2px 5px; font-size: 11px; height: 18px; min-height: 18px; max-height: 18px; outline: none; vertical-align: middle; word-break: normal; white-space: nowrap; width: 75px; min-width: 75px; }
        
        th { background-color: #f1f1f1; font-weight: bold; text-align: center; color: #444; position: sticky; top: 0; z-index: 2; user-select: none; }
        tr th:first-child { position: sticky; left: 0; z-index: 3; background-color: #f1f1f1; }
        
        /* Узкая колонка номеров строк */
        td:first-child { background-color: #f9f9f9; text-align: center; font-weight: bold; color: #666; position: sticky; left: 0; z-index: 1; min-width: 30px !important; width: 30px !important; max-width: 30px !important; }
        td:focus { outline: 1.5px solid #107c41 !important; z-index: 5; position: relative; background-color: #f3f9f5 !important; }
        .hidden-merged-cell { display: none; }
    </style>
</head>
<body>

<div class="table-wrapper">
    <table id="excel-table"></table>
</div>

<script>
    let currentData = [];
    let maxRows = 50;
    let maxCols = 15;

    function createEmptyGrid() {
        const table = document.getElementById('excel-table');
        table.innerHTML = '';
        table.style.tableLayout = "fixed"; // Пустая сетка имеет фиксированные пропорции ячеек Excel

        let headerRow = document.createElement('tr');
        let emptyTh = document.createElement('th');
        emptyTh.style.width = "30px";
        headerRow.appendChild(emptyTh);
        for (let c = 0; c < maxCols; c++) {
            let th = document.createElement('th');
            th.innerText = String.fromCharCode(65 + c);
            th.style.width = "75px";
            headerRow.appendChild(th);
        }
        table.appendChild(headerRow);

        for (let r = 0; r < maxRows; r++) {
            let tr = document.createElement('tr');
            let rowTh = document.createElement('td');
            rowTh.innerText = r + 1;
            tr.appendChild(rowTh);
            currentData[r] = [];
            for (let c = 0; c < maxCols; c++) {
                let td = document.createElement('td');
                td.contentEditable = true;
                td.dataset.row = r;
                td.dataset.col = c;
                currentData[r][c] = "";
                td.addEventListener('blur', function() {
                    currentData[this.dataset.row][this.dataset.col] = this.innerText;
                });
                tr.appendChild(td);
            }
            table.appendChild(tr);
        }
    }

    function loadExcelFromBytes(base64Data) {
        try {
            const binaryString = atob(base64Data);
            const len = binaryString.length;
            const bytes = new Uint8Array(len);
            for (let i = 0; i < len; i++) { bytes[i] = binaryString.charCodeAt(i); }
            const decodedString = new TextDecoder('utf-8').decode(bytes);
            
            const payload = JSON.parse(decodedString);
            const rows = payload.matrix;
            const merges = payload.merges || [];
            
            const table = document.getElementById('excel-table');
            table.innerHTML = '';
            table.style.tableLayout = "auto"; // Открытый файл подстраивается под текст автоматически

            if (!rows || rows.length === 0) {
                createEmptyGrid();
                return;
            }

            currentData = [];
            let colsCount = rows[0].length;

            let headerRow = document.createElement('tr');
            let firstTh = document.createElement('th');
            firstTh.style.width = "30px";
            headerRow.appendChild(firstTh);
            for (let c = 0; c < colsCount; c++) {
                let th = document.createElement('th');
                th.innerText = String.fromCharCode(65 + c);
                th.style.width = "auto";
                headerRow.appendChild(th);
            }
            table.appendChild(headerRow);

            let mergeMap = {};
            merges.forEach(m => {
                for (let r = m.sr; r <= m.er; r++) {
                    for (let c = m.sc; c <= m.ec; c++) {
                        if (r === m.sr && c === m.sc) {
                            mergeMap[`${r}_${c}`] = { isMain: true, rowspan: (m.er - m.sr) + 1, colspan: (m.ec - m.sc) + 1 };
                        } else {
                            mergeMap[`${r}_${c}`] = { isChild: true };
                        }
                    }
                }
            });

            for (let r = 0; r < rows.length; r++) {
                let tr = document.createElement('tr');
                let rowTh = document.createElement('td');
                rowTh.innerText = r + 1;
                tr.appendChild(rowTh);

                currentData[r] = [];

                for (let c = 0; c < colsCount; c++) {
                    let cellData = rows[r][c];
                    let td = document.createElement('td');
                    td.contentEditable = true;
                    td.dataset.row = r;
                    td.dataset.col = c;
                    
                    let textValue = (cellData && cellData.v !== undefined) ? cellData.v : "";
                    td.innerText = textValue;
                    currentData[r][c] = textValue;

                    if (cellData) {
                        if (cellData.bg) td.style.backgroundColor = cellData.bg;
                        if (cellData.color) td.style.color = cellData.color;
                        if (cellData.bold) td.style.fontWeight = "bold";
                        if (cellData.italic) td.style.fontStyle = "italic";
                    }

                    td.addEventListener('blur', function() {
                        currentData[this.dataset.row][this.dataset.col] = this.innerText;
                    });

                    let mergeInfo = mergeMap[`${r}_${c}`];
                    if (mergeInfo) {
                        if (mergeInfo.isMain) {
                            if (mergeInfo.rowspan > 1) td.rowSpan = mergeInfo.rowspan;
                            if (mergeInfo.colspan > 1) td.colSpan = mergeInfo.colspan;
                        } else if (mergeInfo.isChild) {
                            td.classList.add('hidden-merged-cell');
                        }
                    }

                    tr.appendChild(td);
                }
                table.appendChild(tr);
            }
            AndroidBridge.onStatus("Файл успешно визуализирован!");
        } catch (e) {
            AndroidBridge.onStatus("Ошибка отрисовки: " + e.message);
        }
    }

    function exportExcelToAndroid() {
        try {
            const jsonString = JSON.stringify(currentData);
            const encoder = new TextEncoder();
            const bytes = encoder.encode(jsonString);
            let binary = '';
            for (let i = 0; i < bytes.byteLength; i++) { binary += String.fromCharCode(bytes[i]); }
            AndroidBridge.saveFileData(btoa(binary));
        } catch (e) {
            AndroidBridge.onStatus("Ошибка экспорта: " + e.message);
        }
    }

    window.onload = createEmptyGrid;
</script>
</body>
</html>
