<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MiniExcel Fixed Viewport Grid</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: Arial, sans-serif; background-color: #f3f3f3; overflow: hidden; }
        
        /* Контейнер скролла */
        .viewport-container { 
            width: 100%; 
            height: 100%; 
            overflow: auto; 
            -webkit-overflow-scrolling: touch; 
            position: relative;
        }
        
        /* Слой зума */
        .zoom-layer {
            transform-origin: 0 0;
            width: max-content;
            height: max-content;
            position: relative;
        }
        
        table { border-collapse: collapse; table-layout: fixed !important; background: white; box-sizing: border-box; width: max-content; }
        
        /* Ультра-компактные ячейки по умолчанию, чтобы не превышать оригинал */
        th, td { 
            border: 0.5px solid #d4d4d4; 
            padding: 0 3px; 
            font-size: 10px; 
            outline: none; 
            vertical-align: middle; 
            box-sizing: border-box; 
            height: 18px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: clip;
        }
        
        th { background-color: #f1f1f1; font-weight: bold; text-align: center; color: #444; user-select: none; }
        
        /* Закрепленные ячейки */
        .row-number-cell, tr th:first-child { 
            background-color: #f1f1f1 !important; 
            text-align: center; 
            font-weight: bold; 
            color: #666; 
            font-size: 9px;
            user-select: none;
            position: relative;
            z-index: 10;
            width: 32px !important;
            min-width: 32px !important;
            max-width: 32px !important;
            will-change: transform;
        }
        
        tr th:first-child { z-index: 15; }
        
        /* Обычные ячейки контента */
        .excel-cell { background: #ffffff; }
        td:focus { outline: 1.5px solid #107c41 !important; z-index: 20; background-color: #f3f9f5 !important; }
        .hidden-merged-cell { display: none; }

        /* Векторный контейнер для синей рамки документа */
        #svg-bounds-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 8;
        }
    </style>
</head>
<body>

<div class="viewport-container" id="scroll-view">
    <div class="zoom-layer" id="zoom-container">
        <svg id="svg-bounds-overlay">
            <line id="boundary-right" stroke="#0f62fe" stroke-width="2.5" display="none" />
            <line id="boundary-bottom" stroke="#0f62fe" stroke-width="2.5" display="none" />
        </svg>
        <table id="excel-table"></table>
    </div>
</div>

<script>
    let currentData = [];
    let defaultRows = 45;
    let defaultCols = 12;
    
    let currentScale = 1.0;
    let startTouchDist = 0;
    let startScale = 1.0;

    function createEmptyGrid() {
        const table = document.getElementById('excel-table');
        table.innerHTML = '';
        currentData = [];

        let headerRow = document.createElement('tr');
        let emptyTh = document.createElement('th'); headerRow.appendChild(emptyTh);
        for (let c = 0; c < defaultCols; c++) {
            let th = document.createElement('th'); th.innerText = String.fromCharCode(65 + c); th.style.width = "40px"; headerRow.appendChild(th);
        }
        table.appendChild(headerRow);

        for (let r = 0; r < defaultRows; r++) {
            let tr = document.createElement('tr');
            let rowTh = document.createElement('td'); rowTh.className = "row-number-cell"; rowTh.innerText = r + 1; tr.appendChild(rowTh);
            currentData[r] = [];
            for (let c = 0; c < defaultCols; c++) {
                let td = document.createElement('td'); td.contentEditable = true; td.dataset.row = r; td.dataset.col = c; currentData[r][c] = "";
                td.style.width = "40px";
                td.addEventListener('blur', function() { saveCell(this); });
                tr.appendChild(td);
            }
            table.appendChild(tr);
        }
        updateStickyHeaders();
    }

    function saveCell(cell) {
        let cleanText = cell.innerText.replace(/\n/g, '').replace(/\r/g, '').trim();
        currentData[cell.dataset.row][cell.dataset.col] = cleanText;
    }

    function requestDataFromAndroid() {
        try {
            const rawJson = AndroidBridge.getExcelData();
            if (!rawJson) return;
            const payload = JSON.parse(rawJson);
            renderExcelGrid(payload);
        } catch(e) {
            AndroidBridge.onStatus("Ошибка разбора JSON: " + e.message);
        }
    }

    function renderExcelGrid(payload) {
        try {
            const rows = payload.matrix;
            const merges = payload.merges || [];
            const widths = payload.widths || [];
            const heights = payload.heights || [];
            
            const table = document.getElementById('excel-table');
            table.innerHTML = '';
            
            if (!rows || rows.length === 0) { createEmptyGrid(); return; }
            currentData = [];
            
            let colsCount = rows[0].length;
            let rowsCount = rows.length;

            // Поиск реальных контуров текста
            let lastFilledRow = 0;
            let lastFilledCol = 0;
            for (let r = 0; r < rowsCount; r++) {
                for (let c = 0; c < colsCount; c++) {
                    let val = (rows[r][c] && rows[r][c].v !== undefined) ? String(rows[r][c].v).trim() : "";
                    if (val !== "") {
                        if (r > lastFilledRow) lastFilledRow = r;
                        if (c > lastFilledCol) lastFilledCol = c;
                    }
                }
            }
            if (lastFilledRow === 0) lastFilledRow = rowsCount - 1;
            if (lastFilledCol === 0) lastFilledCol = colsCount - 1;

            let colGroup = document.createElement('colgroup');
            let colFirst = document.createElement('col'); colFirst.style.width = "32px"; colGroup.appendChild(colFirst);
            for (let c = 0; c < colsCount; c++) {
                let col = document.createElement('col');
                // ДЕФОЛТНАЯ ШИРИНА СЖАТА С 45 ДО СТРОГИХ И ОРИГИНАЛЬНЫХ 38px
                col.style.width = (widths[c] || 38) + "px";
                colGroup.appendChild(col);
            }
            table.appendChild(colGroup);

            let headerRow = document.createElement('tr');
            let firstTh = document.createElement('th'); headerRow.appendChild(firstTh);
            for (let c = 0; c < colsCount; c++) {
                let th = document.createElement('th'); 
                th.innerText = String.fromCharCode(65 + c); 
                let w = (widths[c] || 38) + "px";
                th.style.width = w; th.style.maxWidth = w; th.style.minWidth = w;
                headerRow.appendChild(th);
            }
            table.appendChild(headerRow);

            let mergeMap = {};
            merges.forEach(m => {
                for (let rRegion = m.sr; rRegion <= m.er; rRegion++) {
                    for (let cRegion = m.sc; cRegion <= m.ec; cRegion++) {
                        if (rRegion === m.sr && cRegion === m.sc) {
                            mergeMap[`${rRegion}_${cRegion}`] = { isMain: true, rowspan: (m.er - m.sr) + 1, colspan: (m.ec - m.sc) + 1 };
                        } else { mergeMap[`${rRegion}_${cRegion}`] = { isChild: true }; }
                    }
                }
            });

            for (let r = 0; r < rowsCount; r++) {
                let tr = document.createElement('tr');
                tr.style.height = (heights[r] || 18) + "px";

                let rowTh = document.createElement('td'); rowTh.className = "row-number-cell"; rowTh.innerText = r + 1; 
                tr.appendChild(rowTh);
                
                currentData[r] = [];

                for (let c = 0; c < colsCount; c++) {
                    let cellData = rows[r][c];
                    let td = document.createElement('td');
                    td.className = "excel-cell";
                    td.contentEditable = true; td.dataset.row = r; td.dataset.col = c;
                    
                    let cellWidth = (widths[c] || 38) + "px";
                    td.style.width = cellWidth; td.style.maxWidth = cellWidth; td.style.minWidth = cellWidth;
                    
                    let textValue = (cellData && cellData.v !== undefined) ? cellData.v : "";
                    currentData[r][c] = textValue;
                    td.innerText = textValue;

                    if (cellData) {
                        if (cellData.bg) td.style.backgroundColor = cellData.bg;
                        if (cellData.color) td.style.color = cellData.color;
                        if (cellData.bold) td.style.fontWeight = "bold";
                        if (cellData.italic) td.style.fontStyle = "italic";
                    }

                    td.addEventListener('blur', function() { saveCell(this); });

                    let mergeInfo = mergeMap[`${r}_${c}`];
                    if (mergeInfo) {
                        if (mergeInfo.isMain) {
                            if (mergeInfo.rowspan > 1) td.rowSpan = mergeInfo.rowspan;
                            if (mergeInfo.colspan > 1) td.colSpan = mergeInfo.colspan;
                            td.style.maxWidth = "none";
                        } else if (mergeInfo.isChild) { td.classList.add('hidden-merged-cell'); }
                    }
                    tr.appendChild(td);
                }
                table.appendChild(tr);
            }
            
            // Расчет и отрисовка идеальной векторной рамки поверх таблицы
            setTimeout(() => { drawVectorBoundary(lastFilledRow, lastFilledCol); }, 80);
            updateStickyHeaders();
        } catch (e) { AndroidBridge.onStatus("Ошибка рендеринга: " + e.message); }
    }

    // Построение абсолютно сплошной, неразрывной синей рамки через геометрические координаты
    function drawVectorBoundary(lastRowIdx, lastColIdx) {
        const table = document.getElementById('excel-table');
        const rows = table.querySelectorAll('tr');
        if (rows.length <= 1) return;

        // Поиск целевых ячеек
        const targetRow = rows[lastRowIdx + 1]; // +1 учитывая буквенную шапку
        if (!targetRow) return;
        const targetCell = targetRow.cells[lastColIdx + 1]; // +1 учитывая цифровую колонку
        if (!targetCell) return;

        const rightLine = document.getElementById('boundary-right');
        const bottomLine = document.getElementById('boundary-bottom');

        // Вычисляем физические координаты правого нижнего угла контента внутри таблицы
        const xCoord = targetCell.offsetLeft + targetCell.offsetWidth;
        const yCoord = targetCell.offsetTop + targetCell.offsetHeight;
        const tableTopOffset = rows[0].offsetHeight; // Граница начинается ПОД строкой букв A, B, C...
        const tableLeftOffset = 32; // Граница начинается ПОСЛЕ колонки номеров строк

        // Применяем точные векторные отрезки
        rightLine.setAttribute('x1', xCoord); rightLine.setAttribute('y1', tableTopOffset);
        rightLine.setAttribute('x2', xCoord); rightLine.setAttribute('y2', yCoord);
        rightLine.setAttribute('display', 'block');

        bottomLine.setAttribute('x1', tableLeftOffset); bottomLine.setAttribute('y1', yCoord);
        bottomLine.setAttribute('x2', xCoord);          bottomLine.setAttribute('y2', yCoord);
        bottomLine.setAttribute('display', 'block');
    }

    // Нативный, мгновенный сдвиг шапок БЕЗ пружинности
    function updateStickyHeaders() {
        const scrollView = document.getElementById('scroll-view');
        
        // Корректируем сдвиг с учетом зума
        const sLeft = scrollView.scrollLeft / currentScale;
        const sTop = scrollView.scrollTop / currentScale;
        
        // Двигаем колонку с номерами строк (влево/вправо)
        const rowCells = document.querySelectorAll('.row-number-cell, tr:first-child th:first-child');
        rowCells.forEach(cell => {
            cell.style.transform = `translateX(${sLeft}px)`;
        });

        // Двигаем шапку с буквами колонок (вверх/вниз)
        const headerCells = document.getElementById('excel-table').querySelectorAll('tr:first-child th');
        headerCells.forEach(cell => {
            cell.style.transform = `translateY(${sTop}px)`;
        });
        
        // Фиксируем левый верхний пустой угол намертво
        const cornerCell = document.querySelector('tr:first-child th:first-child');
        if (cornerCell) {
            cornerCell.style.transform = `translate(${sLeft}px, ${sTop}px)`;
        }
    }

    function initPinchZoom() {
        const scrollView = document.getElementById('scroll-view');
        const zoomContainer = document.getElementById('zoom-container');

        scrollView.addEventListener('scroll', updateStickyHeaders);

        scrollView.addEventListener('touchstart', function(e) {
            if (e.touches.length === 2) {
                e.preventDefault();
                startTouchDist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
                startScale = currentScale;
            }
        }, { passive: false });

        scrollView.addEventListener('touchmove', function(e) {
            if (e.touches.length === 2) {
                e.preventDefault();
                const dist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
                if (startTouchDist > 0) {
                    let targetScale = startScale * (dist / startTouchDist);
                    if (targetScale < 0.5) targetScale = 0.5;
                    if (targetScale > 2.0) targetScale = 2.0;
                    
                    currentScale = targetScale;
                    zoomContainer.style.transform = `scale(${currentScale})`;
                    updateStickyHeaders();
                }
            }
        }, { passive: false });
        
        scrollView.addEventListener('touchend', function(e) { if (e.touches.length < 2) { startTouchDist = 0; } });
        updateStickyHeaders();
    }

    function exportExcelToAndroid() {
        try {
            if (document.activeElement && document.activeElement.tagName === 'TD') {
                saveCell(document.activeElement);
                document.activeElement.blur();
            }
            setTimeout(function() {
                const jsonString = JSON.stringify(currentData);
                const encoder = new TextEncoder(); const bytes = encoder.encode(jsonString);
                let binary = ''; for (let i = 0; i < bytes.byteLength; i++) { binary += String.fromCharCode(bytes[i]); }
                AndroidBridge.saveFileData(btoa(binary));
            }, 50);
        } catch (e) { AndroidBridge.onStatus("Ошибка экспорта: " + e.message); }
    }

    function checkAndLoadData() {
        try {
            if (window.AndroidBridge && typeof AndroidBridge.getExcelData === 'function') {
                const rawJson = AndroidBridge.getExcelData();
                if (rawJson && rawJson.trim() !== "") {
                    const payload = JSON.parse(rawJson);
                    renderExcelGrid(payload);
                    return true;
                }
            }
        } catch (e) { console.log("Опрос: " + e.message); }
        return false;
    }

    window.onload = function() {
        createEmptyGrid();
        initPinchZoom();
        if (!checkAndLoadData()) {
            let retryInterval = setInterval(function() {
                if (checkAndLoadData()) clearInterval(retryInterval);
            }, 300);
            setTimeout(function() { clearInterval(retryInterval); }, 5000);
        }
    };
</script>
</body>
</html>
