<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MiniExcel CSS Grid Engine</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: Arial, sans-serif; background-color: #f3f3f3; overflow: hidden; }
        
        .viewport-container { 
            width: 100%; 
            height: 100%; 
            overflow: auto; 
            -webkit-overflow-scrolling: touch; 
            position: relative;
        }
        
        /* Сетка на базе CSS Grid */
        .grid-container {
            display: grid;
            background-color: #d4d4d4;
            padding-right: 2px;
            padding-bottom: 2px;
            width: max-content;
            height: max-content;
        }
        
        /* Базовый стиль для всех ячеек */
        .cell {
            background: #ffffff;
            box-sizing: border-box;
            padding: 0 3px;
            font-size: 10px;
            display: flex;
            align-items: center;
            overflow: hidden;
            white-space: nowrap;
            text-overflow: clip;
            outline: none;
        }
        
        /* Стили заголовков (A, B, C / 1, 2, 3) */
        .header-cell {
            background-color: #f1f1f1;
            font-weight: bold;
            color: #444;
            justify-content: center;
            user-select: none;
        }
        
        /* Нативный аппаратный sticky для номеров строк */
        .row-num {
            position: sticky !important;
            left: 0;
            z-index: 10;
            color: #666;
            font-size: 9px;
            box-shadow: 1px 0 0 #d4d4d4;
        }
        
        /* Нативный аппаратный sticky для букв колонок */
        .col-num {
            position: sticky !important;
            top: 0;
            z-index: 9;
            box-shadow: 0 1px 0 #d4d4d4;
        }
        
        /* Пересечение (левый верхний угол) */
        .corner-cell {
            position: sticky !important;
            top: 0;
            left: 0;
            z-index: 15;
        }
        
        .cell:focus { 
            outline: 1.5px solid #107c41 !important; 
            z-index: 20 !important; 
            background-color: #f3f9f5 !important; 
        }

        /* Безупречные синие рамки документа, не зависящие от структуры ячеек */
        .doc-right-boundary { box-shadow: inset -2px 0 0 #0f62fe, 1px 0 0 #d4d4d4; z-index: 5; }
        .doc-bottom-boundary { box-shadow: inset 0 -2px 0 #0f62fe, 0 1px 0 #d4d4d4; z-index: 5; }
        .doc-both-boundary { box-shadow: inset -2px -2px 0 #0f62fe, 1px 1px 0 #d4d4d4; z-index: 6; }
    </style>
</head>
<body>

<div class="viewport-container" id="scroll-view">
    <div class="grid-container" id="grid-container"></div>
</div>

<script>
    let currentData = [];
    let defaultRows = 45;
    let defaultCols = 12;
    
    let currentScale = 1.0;
    let startTouchDist = 0;
    let startScale = 1.0;

    function createEmptyGrid() {
        const container = document.getElementById('grid-container');
        container.innerHTML = '';
        
        // Задаем размеры сетки: 32px для номеров строк, остальные по 38px
        let colStyles = "32px ";
        for(let i=0; i<defaultCols; i++) colStyles += "38px ";
        container.style.gridTemplateColumns = colStyles;
        
        let rowStyles = "18px ";
        for(let i=0; i<defaultRows; i++) rowStyles += "18px ";
        container.style.gridTemplateRows = rowStyles;

        // Угол
        let corner = document.createElement('div');
        corner.className = "cell header-cell corner-cell";
        container.appendChild(corner);

        // Буквы A, B, C...
        for (let c = 0; c < defaultCols; c++) {
            let th = document.createElement('div');
            th.className = "cell header-cell col-num";
            th.innerText = String.fromCharCode(65 + c);
            container.appendChild(th);
        }

        // Строки
        for (let r = 0; r < defaultRows; r++) {
            let rowTh = document.createElement('div');
            rowTh.className = "cell header-cell row-num";
            rowTh.innerText = r + 1;
            container.appendChild(rowTh);

            for (let c = 0; c < defaultCols; c++) {
                let td = document.createElement('div');
                td.className = "cell";
                td.contentEditable = true;
                container.appendChild(td);
            }
        }
    }

    function requestDataFromAndroid() {
        try {
            const rawJson = AndroidBridge.getExcelData();
            if (!rawJson) return;
            const payload = JSON.parse(rawJson);
            renderExcelGrid(payload);
        } catch(e) {
            AndroidBridge.onStatus("Ошибка разбора JSON: " + e.message);
        }
    }

    function renderExcelGrid(payload) {
        try {
            const rows = payload.matrix;
            const merges = payload.merges || [];
            const widths = payload.widths || [];
            const heights = payload.heights || [];
            
            const container = document.getElementById('grid-container');
            container.innerHTML = '';
            
            if (!rows || rows.length === 0) { createEmptyGrid(); return; }
            currentData = [];
            
            let colsCount = rows[0].length;
            let rowsCount = rows.length;

            // Нахождение контура заполненных данных для синей рамки
            let lastFilledRow = 0;
            let lastFilledCol = 0;
            for (let r = 0; r < rowsCount; r++) {
                for (let c = 0; c < colsCount; c++) {
                    let val = (rows[r][c] && rows[r][c].v !== undefined) ? String(rows[r][c].v).trim() : "";
                    if (val !== "") {
                        if (r > lastFilledRow) lastFilledRow = r;
                        if (c > lastFilledCol) lastFilledCol = c;
                    }
                }
            }
            if (lastFilledRow === 0) lastFilledRow = rowsCount - 1;
            if (lastFilledCol === 0) lastFilledCol = colsCount - 1;

            // Конфигурируем CSS Grid шаблоны колонок и строк
            let colStyles = "32px ";
            for (let c = 0; c < colsCount; c++) {
                // Оригинальная ширина из POI Excel (на базе коэф. 2.0 из Java)
                colStyles += (widths[c] || 38) + "px ";
            }
            container.style.gridTemplateColumns = colStyles;

            let rowStyles = "18px ";
            for (let r = 0; r < rowsCount; r++) {
                rowStyles += (heights[r] || 18) + "px ";
            }
            container.style.gridTemplateRows = rowStyles;

            // Рендерим шапку (Угол)
            let corner = document.createElement('div');
            corner.className = "cell header-cell corner-cell";
            container.appendChild(corner);

            // Рендерим буквы (A, B, C...)
            for (let c = 0; c < colsCount; c++) {
                let th = document.createElement('div');
                th.className = "cell header-cell col-num";
                th.innerText = String.fromCharCode(65 + c);
                if (c === lastFilledCol) th.classList.add('doc-right-boundary');
                container.appendChild(th);
            }

            // Создаем карту объединенных областей
            let mergeMap = {};
            let hiddenMap = {};
            merges.forEach(m => {
                for (let r = m.sr; r <= m.er; r++) {
                    for (let c = m.sc; c <= m.ec; c++) {
                        if (r === m.sr && c === m.sc) {
                            mergeMap[`${r}_${c}`] = { rSpan: (m.er - m.sr) + 1, cSpan: (m.ec - m.sc) + 1 };
                        } else {
                            hiddenMap[`${r}_${c}`] = true;
                        }
                    }
                }
            });

            // Рендерим ячейки матрицы контента
            for (let r = 0; r < rowsCount; r++) {
                let rowTh = document.createElement('div');
                rowTh.className = "cell header-cell row-num";
                rowTh.innerText = r + 1;
                if (r === lastFilledRow) rowTh.classList.add('doc-bottom-boundary');
                container.appendChild(rowTh);

                currentData[r] = [];

                for (let c = 0; c < colsCount; c++) {
                    let cellData = rows[r][c];
                    let textValue = (cellData && cellData.v !== undefined) ? cellData.v : "";
                    currentData[r][c] = textValue;

                    if (hiddenMap[`${r}_${c}`]) {
                        continue; // Пропускаем ячейки, которые поглощены объединением
                    }

                    let td = document.createElement('div');
                    td.className = "cell";
                    td.contentEditable = true;
                    td.innerText = textValue;
                    
                    // Задаем координаты внутри CSS Grid для поддержки Merges
                    let gridRowStart = r + 2; // +2 учитывая шапку и отсчет с 1
                    let gridColStart = c + 2; // +2 учитывая номер строки и отсчет с 1
                    let gridRowEnd = gridRowStart + 1;
                    let gridColEnd = gridColStart + 1;

                    let mergeInfo = mergeMap[`${r}_${c}`];
                    if (mergeInfo) {
                        gridRowEnd = gridRowStart + mergeInfo.rSpan;
                        gridColEnd = gridColStart + mergeInfo.cSpan;
                    }

                    td.style.gridRow = `${gridRowStart} / ${gridRowEnd}`;
                    td.style.gridColumn = `${gridColStart} / ${gridColEnd}`;

                    if (cellData) {
                        if (cellData.bg) td.style.backgroundColor = cellData.bg;
                        if (cellData.color) td.style.color = cellData.color;
                        if (cellData.bold) td.style.fontWeight = "bold";
                        if (cellData.italic) td.style.fontStyle = "italic";
                    }

                    // Просчет нанесения идеальной синей рамки по контуру данных
                    let isRightEdge = (c === lastFilledCol) || (mergeInfo && (c + mergeInfo.cSpan - 1 === lastFilledCol));
                    let isBottomEdge = (r === lastFilledRow) || (mergeInfo && (r + mergeInfo.rSpan - 1 === lastFilledRow));

                    if (isRightEdge && isBottomEdge) td.classList.add('doc-both-boundary');
                    else if (isRightEdge) td.classList.add('doc-right-boundary');
                    else if (isBottomEdge) td.classList.add('doc-bottom-boundary');

                    td.addEventListener('blur', function() {
                        let cleanText = this.innerText.replace(/\n/g, '').replace(/\r/g, '').trim();
                        currentData[r][c] = cleanText;
                    });

                    container.appendChild(td);
                }
            }
            AndroidBridge.onStatus("Документ успешно отрисован!");
        } catch (e) { AndroidBridge.onStatus("Ошибка рендеринга: " + e.message); }
    }

    function initPinchZoom() {
        const scrollView = document.getElementById('scroll-view');
        const container = document.getElementById('grid-container');

        scrollView.addEventListener('touchstart', function(e) {
            if (e.touches.length === 2) {
                e.preventDefault();
                startTouchDist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
                startScale = currentScale;
            }
        }, { passive: false });

        scrollView.addEventListener('touchmove', function(e) {
            if (e.touches.length === 2) {
                e.preventDefault();
                const dist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
                if (startTouchDist > 0) {
                    let targetScale = startScale * (dist / startTouchDist);
                    if (targetScale < 0.6) targetScale = 0.6;
                    if (targetScale > 1.6) targetScale = 1.6;
                    
                    currentScale = targetScale;
                    // Оптимальное масштабирование через transform без разрушения контекста sticky
                    container.style.transform = `scale(${currentScale})`;
                    container.style.transformOrigin = `0 0`;
                }
            }
        }, { passive: false });
        
        scrollView.addEventListener('touchend', function(e) { if (e.touches.length < 2) { startTouchDist = 0; } });
    }

    function exportExcelToAndroid() {
        try {
            if (document.activeElement && document.activeElement.classList.contains('cell')) {
                document.activeElement.blur();
            }
            setTimeout(function() {
                const jsonString = JSON.stringify(currentData);
                const encoder = new TextEncoder(); const bytes = encoder.encode(jsonString);
                let binary = ''; for (let i = 0; i < bytes.byteLength; i++) { binary += String.fromCharCode(bytes[i]); }
                AndroidBridge.saveFileData(btoa(binary));
            }, 50);
        } catch (e) { AndroidBridge.onStatus("Ошибка экспорта: " + e.message); }
    }

    function checkAndLoadData() {
        try {
            if (window.AndroidBridge && typeof AndroidBridge.getExcelData === 'function') {
                const rawJson = AndroidBridge.getExcelData();
                if (rawJson && rawJson.trim() !== "") {
                    const payload = JSON.parse(rawJson);
                    renderExcelGrid(payload);
                    return true;
                }
            }
        } catch (e) { console.log("Опрос: " + e.message); }
        return false;
    }

    window.onload = function() {
        createEmptyGrid();
        initPinchZoom();
        if (!checkAndLoadData()) {
            let retryInterval = setInterval(function() {
                if (checkAndLoadData()) clearInterval(retryInterval);
            }, 300);
            setTimeout(function() { clearInterval(retryInterval); }, 5000);
        }
    };
</script>
</body>
</html>
