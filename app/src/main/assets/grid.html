<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, target-densitydpi=device-dpi">
    <title>MiniExcel Rigid Engine</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #f3f3f3; }
        #canvas-container { width: 100%; height: 100%; position: relative; }
        canvas { display: block; width: 100%; height: 100%; }
        #cell-editor {
            position: absolute;
            display: none;
            border: 2px solid #107c41;
            outline: none;
            padding: 0 4px;
            font-family: Arial, sans-serif;
            font-size: 11px;
            box-sizing: border-box;
            background: white;
            z-index: 100;
        }
    </style>
</head>
<body>

<div id="canvas-container">
    <canvas id="excelCanvas"></canvas>
    <input type="text" id="cell-editor" />
</div>

<script>
    const canvas = document.getElementById('excelCanvas');
    const ctx = canvas.getContext('2d');
    const editor = document.getElementById('cell-editor');

    let matrix = [];
    let merges = [];
    let widths = [];
    let heights = [];

    let scrollX = 0;
    let scrollY = 0;
    let zoom = 1.0;

    let maxCols = 12;
    let maxRows = 45;

    const ROW_NUM_WIDTH = 38;
    const COL_NUM_HEIGHT = 20;

    let lastFilledRow = 0;
    let lastFilledCol = 0;

    let selectedCell = null;
    let isDragging = false;
    let lastTouchX = 0;
    let lastTouchY = 0;
    let startTouchDist = 0;
    let startZoom = 1.0;

    function getColName(colIndex) {
        let name = "";
        while (colIndex >= 0) {
            name = String.fromCharCode((colIndex % 26) + 65) + name;
            colIndex = Math.floor(colIndex / 26) - 1;
        }
        return name;
    }

    function getMergedCellInfo(row, col) {
        for (let i = 0; i < merges.length; i++) {
            let m = merges[i];
            if (row >= m.sr && row <= m.er && col >= m.sc && col <= m.ec) {
                return m;
            }
        }
        return null;
    }

    function initEmptyGrid() {
        matrix = [];
        for (let r = 0; r < maxRows; r++) {
            matrix[r] = [];
            for (let c = 0; c < maxCols; c++) {
                matrix[r][c] = { v: "" };
            }
        }
        widths = Array(maxCols).fill(34);
        heights = Array(maxRows).fill(18);
        lastFilledRow = maxRows - 1;
        lastFilledCol = maxCols - 1;
        resizeCanvas();
    }

    function resizeCanvas() {
        const dpr = window.devicePixelRatio || 1;
        canvas.width = canvas.clientWidth * dpr;
        canvas.height = canvas.clientHeight * dpr;
        
        ctx.resetTransform();
        ctx.scale(dpr, dpr);

        if (widths.length > 0 && canvas.clientWidth > 0) {
            let totalSheetW = 0; 
            for(let i = 0; i <= lastFilledCol; i++) totalSheetW += widths[i];
            let screenWorkW = canvas.clientWidth - ROW_NUM_WIDTH;
            if (totalSheetW > screenWorkW && screenWorkW > 0) {
                zoom = screenWorkW / totalSheetW;
                if (zoom < 0.25) zoom = 0.25;
                if (zoom > 1.0) zoom = 1.0;
            }
        }
        draw();
    }

    window.addEventListener('resize', resizeCanvas);

    function requestDataFromAndroid() {
        try {
            const rawJson = AndroidBridge.getExcelData();
            if (!rawJson) {
                initEmptyGrid();
                return;
            }
            const payload = JSON.parse(rawJson);
            
            // Если матрица пустая (первый запуск), инициализируем дефолтную сетку
            if (!payload.matrix || payload.matrix.length === 0) {
                initEmptyGrid();
                return;
            }
            
            matrix = payload.matrix;
            merges = payload.merges || [];
            let incomingWidths = payload.widths || [];
            heights = payload.heights || [];
            
            maxRows = matrix.length;
            maxCols = matrix[0].length;

            lastFilledRow = 0;
            lastFilledCol = 0;

            widths = [];
            for (let c = 0; c < maxCols; c++) {
                let w = incomingWidths[c];
                widths[c] = (w && w > 0) ? Math.round(w) : 64;
            }

            heights = [];
            for (let r = 0; r < maxRows; r++) {
                let h = payload.heights[r];
                heights[r] = (h && h > 0) ? Math.round(h) : 20;
            }

            for (let r = 0; r < maxRows; r++) {
                for (let c = 0; c < maxCols; c++) {
                    let val = (matrix[r][c] && matrix[r][c].v !== undefined) ? String(matrix[r][c].v).trim() : "";
                    if (val !== "") {
                        let mInfo = getMergedCellInfo(r, c);
                        let checkR = mInfo ? mInfo.er : r;
                        let checkC = mInfo ? mInfo.ec : c;

                        if (checkR > lastFilledRow) lastFilledRow = checkR;
                        if (checkC > lastFilledCol) lastFilledCol = checkC;
                    }
                }
            }
            if (lastFilledRow === 0) lastFilledRow = maxRows - 1;
            if (lastFilledCol === 0) lastFilledCol = maxCols - 1;

            let totalSheetW = 0; for(let i=0; i<=lastFilledCol; i++) totalSheetW += widths[i];
            let screenWorkW = canvas.clientWidth - ROW_NUM_WIDTH;
            if (totalSheetW > screenWorkW && screenWorkW > 0) {
                zoom = screenWorkW / totalSheetW;
                if (zoom < 0.25) zoom = 0.25;
                if (zoom > 1.0) zoom = 1.0;
            } else {
                zoom = 1.0;
            }

            editor.style.display = 'none';
            selectedCell = null;
            draw();
            
            AndroidBridge.onStatus("Итоговая ширина первой колонки: " + widths[0] + "px");
        } catch(e) {
            AndroidBridge.onStatus("Ошибка разбора JSON: " + e.message);
            initEmptyGrid(); // В случае сбоя оставляем пустую рабочую сетку
        }
    }

    function getCellRect(row, col) {
        let x = 0;
        for (let i = 0; i < col; i++) x += widths[i];
        let y = 0;
        for (let i = 0; i < row; i++) y += heights[i];
        return { x: x, y: y, w: widths[col], h: heights[row] };
    }

    function draw() {
        if (!canvas.clientWidth || !canvas.clientHeight) return;
        
        ctx.clearRect(0, 0, canvas.clientWidth, canvas.clientHeight);
        ctx.save();

        // Отрезаем область под сетку данных, оставляя шапки фиксированными
        ctx.beginPath();
        ctx.rect(ROW_NUM_WIDTH, COL_NUM_HEIGHT, canvas.clientWidth - ROW_NUM_WIDTH, canvas.clientHeight - COL_NUM_HEIGHT);
        ctx.clip();

        ctx.translate(ROW_NUM_WIDTH, COL_NUM_HEIGHT);
        ctx.scale(zoom, zoom);
        ctx.translate(scrollX, scrollY);

        // 1. Отрисовка ячеек
        for (let r = 0; r < maxRows; r++) {
            for (let c = 0; c < maxCols; c++) {
                let m = getMergedCellInfo(r, c);
                if (m && (r !== m.sr || c !== m.sc)) continue; // Рисуем только главную ячейку из объединенных

                let rect = getCellRect(r, c);
                if (m) {
                    rect.w = 0; for(let i=m.sc; i<=m.ec; i++) rect.w += widths[i];
                    rect.h = 0; for(let i=m.sr; i<=m.er; i++) rect.h += heights[i];
                }

                // Фоновый цвет
                let cellData = matrix[r][c] || {};
                ctx.fillStyle = cellData.bg ? cellData.bg : "#ffffff";
                ctx.fillRect(rect.x, rect.y, rect.w, rect.h);

                // Сетка (границы)
                ctx.strokeStyle = "#e1e1e1";
                ctx.lineWidth = 1 / zoom;
                ctx.strokeRect(rect.x, rect.y, rect.w, rect.h);

                // Текст
                let val = cellData.v !== undefined ? String(cellData.v) : "";
                if (val) {
                    ctx.save();
                    ctx.beginPath();
                    ctx.rect(rect.x + 2, rect.y + 2, rect.w - 4, rect.h - 4);
                    ctx.clip();

                    let fontStyle = "";
                    if (cellData.bold) fontStyle += "bold ";
                    if (cellData.italic) fontStyle += "italic ";
                    ctx.font = `${fontStyle}11px Arial`;
                    ctx.fillStyle = cellData.color ? cellData.color : "#000000";
                    ctx.textBaseline = "middle";
                    
                    ctx.fillText(val, rect.x + 4, rect.y + rect.h / 2);
                    ctx.restore();
                }
            }
        }

        // Подсветка выделенной ячейки
        if (selectedCell) {
            let m = getMergedCellInfo(selectedCell.r, selectedCell.c);
            let r = m ? m.sr : selectedCell.r;
            let c = m ? m.sc : selectedCell.c;
            let rect = getCellRect(r, c);
            if (m) {
                rect.w = 0; for(let i=m.sc; i<=m.ec; i++) rect.w += widths[i];
                rect.h = 0; for(let i=m.sr; i<=m.er; i++) rect.h += heights[i];
            }
            ctx.strokeStyle = "#107c41";
            ctx.lineWidth = 2 / zoom;
            ctx.strokeRect(rect.x, rect.y, rect.w, rect.h);
        }

        ctx.restore();

        // 2. Статичные заголовки колонок (A, B, C...)
        ctx.save();
        ctx.fillStyle = "#f3f3f3";
        ctx.fillRect(ROW_NUM_WIDTH, 0, canvas.clientWidth - ROW_NUM_WIDTH, COL_NUM_HEIGHT);
        ctx.strokeStyle = "#bbb";
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(ROW_NUM_WIDTH, COL_NUM_HEIGHT);
        ctx.lineTo(canvas.clientWidth, COL_NUM_HEIGHT);
        ctx.stroke();

        ctx.translate(ROW_NUM_WIDTH, 0);
        ctx.scale(zoom, 1);
        ctx.translate(scrollX, 0);

        ctx.font = "11px Arial";
        ctx.fillStyle = "#000000";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";

        let currentX = 0;
        for (let c = 0; c < maxCols; c++) {
            ctx.strokeRect(currentX, 0, widths[c], COL_NUM_HEIGHT);
            ctx.fillText(getColName(c), currentX + widths[c] / 2, COL_NUM_HEIGHT / 2);
            currentX += widths[c];
        }
        ctx.restore();

        // 3. Статичные заголовки строк (1, 2, 3...)
        ctx.save();
        ctx.fillStyle = "#f3f3f3";
        ctx.fillRect(0, COL_NUM_HEIGHT, ROW_NUM_WIDTH, canvas.clientHeight - COL_NUM_HEIGHT);
        ctx.strokeStyle = "#bbb";
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(ROW_NUM_WIDTH, COL_NUM_HEIGHT);
        ctx.lineTo(ROW_NUM_WIDTH, canvas.clientHeight);
        ctx.stroke();

        ctx.translate(0, COL_NUM_HEIGHT);
        ctx.scale(1, zoom);
        ctx.translate(0, scrollY);

        ctx.font = "11px Arial";
        ctx.fillStyle = "#000000";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";

        let currentY = 0;
        for (let r = 0; r < maxRows; r++) {
            ctx.strokeRect(0, currentY, ROW_NUM_WIDTH, heights[r]);
            ctx.fillText(r + 1, ROW_NUM_WIDTH / 2, currentY + heights[r] / 2);
            currentY += heights[r];
        }
        ctx.restore();

        // Угловой квадрат (пересечение шапок)
        ctx.fillStyle = "#e1e1e1";
        ctx.fillRect(0, 0, ROW_NUM_WIDTH, COL_NUM_HEIGHT);
        ctx.strokeStyle = "#bbb";
        ctx.strokeRect(0, 0, ROW_NUM_WIDTH, COL_NUM_HEIGHT);
    }

    // --- ОБРАБОТКА ТАЧ-СОБЫТИЙ (СКРОЛЛ, ЗУМ И КЛИКИ) ---
    canvas.addEventListener('touchstart', e => {
        isDragging = true;
        if (e.touches.length === 1) {
            // Одиночное касание для скролла
            lastTouchX = e.touches[0].clientX;
            lastTouchY = e.touches[0].clientY;
        } else if (e.touches.length === 2) {
            // Двойное касание для масштабирования (Pinch-to-Zoom)
            let dx = e.touches[0].clientX - e.touches[1].clientX;
            let dy = e.touches[0].clientY - e.touches[1].clientY;
            startTouchDist = Math.sqrt(dx * dx + dy * dy);
            startZoom = zoom;
        }
    });

    canvas.addEventListener('touchmove', e => {
        if (!isDragging) return;

        if (e.touches.length === 1) {
            // Скролл одним пальцем
            let dx = e.touches[0].clientX - lastTouchX;
            let dy = e.touches[0].clientY - lastTouchY;
            scrollX += dx / zoom;
            scrollY += dy / zoom;
            lastTouchX = e.touches[0].clientX;
            lastTouchY = e.touches[0].clientY;
            
            // Ограничения, чтобы таблица не улетала за границы экрана
            if (scrollX > 0) scrollX = 0;
            if (scrollY > 0) scrollY = 0;
            
            editor.style.display = 'none';
            draw();
        } else if (e.touches.length === 2) {
            // Зум двумя пальцами
            let dx = e.touches[0].clientX - e.touches[1].clientX;
            let dy = e.touches[0].clientY - e.touches[1].clientY;
            let currentDist = Math.sqrt(dx * dx + dy * dy);

            if (startTouchDist > 0) {
                let factor = currentDist / startTouchDist;
                zoom = startZoom * factor;
                
                // Жесткие рамки для зума (от 25% до 200%)
                if (zoom < 0.25) zoom = 0.25;
                if (zoom > 2.0) zoom = 2.0;
                
                draw();
            }
        }
    });

    canvas.addEventListener('touchend', e => {
        if (e.touches.length === 0) {
            isDragging = false;
            startTouchDist = 0;

            // Обработка обычного клика/тапа по ячейке
            if (e.changedTouches.length === 1) {
                let clickX = e.changedTouches[0].clientX;
                let clickY = e.changedTouches[0].clientY;

                if (clickX > ROW_NUM_WIDTH && clickY > COL_NUM_HEIGHT) {
                    let cellX = (clickX - ROW_NUM_WIDTH) / zoom - scrollX;
                    let cellY = (clickY - COL_NUM_HEIGHT) / zoom - scrollY;

                    let currentX = 0, targetCol = -1;
                    for (let c = 0; c < maxCols; c++) {
                        if (cellX >= currentX && cellX <= currentX + widths[c]) { targetCol = c; break; }
                        currentX += widths[c];
                    }

                    let currentY = 0, targetRow = -1;
                    for (let r = 0; r < maxRows; r++) {
                        if (cellY >= currentY && cellY <= currentY + heights[r]) { targetRow = r; break; }
                        currentY += heights[r];
                    }

                    if (targetRow !== -1 && targetCol !== -1) {
                        selectedCell = { r: targetRow, c: targetCol };
                        draw();
                    }
                }
            }
        } else if (e.touches.length === 1) {
            // Если один палец убрали, а второй остался — перестраиваем координату скролла
            lastTouchX = e.touches[0].clientX;
            lastTouchY = e.touches[0].clientY;
        }
    });

    window.onload = function() {
        initEmptyGrid();
        if (window.AndroidBridge && typeof AndroidBridge.getExcelData === "function") {
            requestDataFromAndroid();
        }
    };
</script>
</body>
</html>
