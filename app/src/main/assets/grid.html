<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MiniExcel Native Engine</title>
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #ffffff;
            font-family: Arial, sans-serif;
            position: fixed;
        }

        #excelCanvas {
            display: block;
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        #debug-panel {
            position: absolute;
            top: 25px;
            left: 50px;
            z-index: 999;
            background: rgba(0, 0, 0, 0.85);
            color: #00ff00;
            padding: 6px 10px;
            font-size: 11px;
            border-radius: 4px;
            pointer-events: none;
            max-width: 80vw;
            word-break: break-all;
        }

        #cell-editor {
            position: absolute;
            display: none;
            z-index: 10;
            border: 2px solid #0f62fe;
            background: white;
            outline: none;
            padding: 0 4px;
            font-size: 14px;
            margin: 0;
        }
    </style>
</head>
<body>

<div id="debug-panel">Инициализация...</div>
<canvas id="excelCanvas"></canvas>
<input type="text" id="cell-editor" />

<script>
    const canvas = document.getElementById('excelCanvas');
    const ctx = canvas.getContext('2d');
    const editor = document.getElementById('cell-editor');
    const debugPanel = document.getElementById('debug-panel');

    let matrix = [];
    let merges = [];
    let widths = [];
    let heights = [];
    let mergeLookup = {}; 

    let scrollX = 0;
    let scrollY = 0;
    let zoom = 1.0;

    let maxCols = 0;
    let maxRows = 0;

    const ROW_NUM_WIDTH = 45;
    const COL_NUM_HEIGHT = 22;

    let selectedCell = null;
    let isDragging = false;
    let lastTouchX = 0, lastTouchY = 0;
    let startTouchDist = 0, startZoom = 1.0;
    let hasMoved = false, touchHandled = false;

    function logDebug(text) {
        console.log(text);
        if (debugPanel) debugPanel.innerText = text;
    }

    function getColName(colIndex) {
        let name = "";
        let n = colIndex;
        while (n >= 0) {
            name = String.fromCharCode((n % 26) + 65) + name;
            n = Math.floor(n / 26) - 1;
        }
        return name;
    }

    function buildMergeLookup() {
        mergeLookup = {};
        if (!Array.isArray(merges) || merges.length === 0) return 0;

        let validCount = 0;
        merges.forEach(m => {
            if (!m) return;
            let sr = parseInt(m.sr ?? m.startRow ?? m.row1 ?? -1);
            let sc = parseInt(m.sc ?? m.startCol ?? m.col1 ?? -1);
            let er = parseInt(m.er ?? m.endRow ?? m.row2 ?? -1);
            let ec = parseInt(m.ec ?? m.endCol ?? m.col2 ?? -1);

            if (sr < 0 || sc < 0 || er < 0 || ec < 0) return;

            m.sr = sr; m.sc = sc; m.er = er; m.ec = ec;
            validCount++;

            for (let r = sr; r <= er; r++) {
                for (let c = sc; c <= ec; c++) {
                    mergeLookup[`${r}_${c}`] = (r === sr && c === sc) 
                        ? { isMain: true, isChild: false, m: m } 
                        : { isMain: false, isChild: true, m: m };
                }
            }
        });
        return validCount;
    }

    function getMergedCellInfo(row, col) {
        let lookup = mergeLookup[`${row}_${col}`];
        return lookup ? lookup.m : null;
    }

    function getScrollLimits() {
        let clientW = canvas.clientWidth || window.innerWidth;
        let clientH = canvas.clientHeight || window.innerHeight;
        let totalW = 0; for (let i = 0; i < maxCols; i++) totalW += (widths[i] || 70);
        let totalH = 0; for (let i = 0; i < maxRows; i++) totalH += (heights[i] || 22);
        let maxSX = Math.max(0, totalW - (clientW - ROW_NUM_WIDTH) / zoom + 50);
        let maxSY = Math.max(0, totalH - (clientH - COL_NUM_HEIGHT) / zoom + 50);
        return { x: maxSX, y: maxSY };
    }

    function initEmptyGrid() {
        maxRows = 30;
        maxCols = 10;
        matrix = [];
        for (let r = 0; r < maxRows; r++) {
            matrix[r] = [];
            for (let c = 0; c < maxCols; c++) { matrix[r][c] = { v: "" }; }
        }
        widths = Array(maxCols).fill(70);
        heights = Array(maxRows).fill(22);
        merges = [];
        mergeLookup = {};
        logDebug("Режим заглушки");
        updateCanvasDimensions();
        draw();
    }

    function updateCanvasDimensions() {
        if (!canvas) return false;
        let displayW = canvas.clientWidth || window.innerWidth;
        let displayH = canvas.clientHeight || window.innerHeight;
        if (displayW === 0 || displayH === 0) return false;

        const dpr = window.devicePixelRatio || 1;
        let targetW = Math.floor(displayW * dpr);
        let targetH = Math.floor(displayH * dpr);

        if (canvas.width !== targetW || canvas.height !== targetH) {
            canvas.width = targetW;
            canvas.height = targetH;
        }
        ctx.resetTransform();
        ctx.scale(dpr, dpr);
        return true;
    }

    function requestDataFromAndroid() {
        try {
            if (!window.AndroidBridge || typeof AndroidBridge.getExcelData !== 'function') {
                initEmptyGrid();
                return;
            }

            const rawJson = AndroidBridge.getExcelData();
            if (!rawJson) {
                initEmptyGrid();
                return;
            }

            let payload = JSON.parse(rawJson);
            if (!payload || !payload.matrix || payload.matrix.length === 0) {
                initEmptyGrid();
                return;
            }

            matrix = payload.matrix;
            maxRows = matrix.length;
            maxCols = matrix[0] ? matrix[0].length : 10;

            merges = payload.merges || [];
            let incomingWidths = payload.widths || [];
            let incomingHeights = payload.heights || [];

            widths = [];
            for (let c = 0; c < maxCols; c++) {
                widths[c] = (incomingWidths[c] && incomingWidths[c] > 0) ? Math.round(incomingWidths[c]) : 70;
            }

            heights = [];
            for (let r = 0; r < maxRows; r++) {
                heights[r] = (incomingHeights[r] && incomingHeights[r] > 0) ? Math.round(incomingHeights[r]) : 22;
            }

            let activeMergesCount = buildMergeLookup();
            logDebug(`Строк: ${maxRows} | Столбцов: ${maxCols} | Мержей: ${activeMergesCount}`);

            scrollX = 0;
            scrollY = 0;
            editor.style.display = 'none';
            selectedCell = null;
            
            updateCanvasDimensions();
            draw();

        } catch(e) {
            logDebug("Ошибка JSON: " + e.message);
            initEmptyGrid();
        }
    }

    function getCellRect(row, col) {
        let x = 0; for (let i = 0; i < col; i++) x += (widths[i] || 70);
        let y = 0; for (let i = 0; i < row; i++) y += (heights[i] || 22);
        return { x: x, y: y, w: (widths[col] || 70), h: (heights[row] || 22) };
    }

    function draw() {
        if (!updateCanvasDimensions()) return;
        let clientW = canvas.clientWidth || window.innerWidth;
        let clientH = canvas.clientHeight || window.innerHeight;
        
        ctx.clearRect(0, 0, clientW, clientH);
        if (!matrix || matrix.length === 0) return;

        ctx.save();
        ctx.textBaseline = 'middle';

        // 1. ФОНЫ ЯЧЕЕК
        for (let r = 0; r < maxRows; r++) {
            for (let c = 0; c < maxCols; c++) {
                let lookup = mergeLookup[`${r}_${c}`];
                if (lookup && lookup.isChild) continue; 

                let rect = getCellRect(r, c);
                let cx = ROW_NUM_WIDTH + (rect.x - scrollX) * zoom;
                let cy = COL_NUM_HEIGHT + (rect.y - scrollY) * zoom;
                let cw = rect.w * zoom;
                let ch = rect.h * zoom;

                if (lookup && lookup.isMain) {
                    let fullW = 0; let fullH = 0;
                    for (let i = lookup.m.sc; i <= lookup.m.ec; i++) fullW += (widths[i] || 70);
                    for (let i = lookup.m.sr; i <= lookup.m.er; i++) fullH += (heights[i] || 22);
                    cw = fullW * zoom; ch = fullH * zoom;
                }

                if (cx + cw < ROW_NUM_WIDTH || cy + ch < COL_NUM_HEIGHT || cx > clientW || cy > clientH) continue;

                let cellData = matrix[r] ? (matrix[r][c] || {}) : {};
                let bg = (typeof cellData === 'object') ? (cellData.bg || cellData.backgroundColor) : null;

                ctx.fillStyle = bg ? bg : "#ffffff";
                ctx.fillRect(Math.floor(cx), Math.floor(cy), Math.ceil(cw), Math.ceil(ch));
            }
        }

        // 2. СЕТКА (Отображается всегда для любых файлов)
        ctx.save();
        ctx.strokeStyle = "#d0d0d0"; 
        ctx.lineWidth = 1;

        let totalGridW = 0; for (let i = 0; i < maxCols; i++) totalGridW += (widths[i] || 70);
        let totalGridH = 0; for (let i = 0; i < maxRows; i++) totalGridH += (heights[i] || 22);

        let currentY = 0;
        for (let r = 0; r <= maxRows; r++) {
            let cy = COL_NUM_HEIGHT + Math.round((currentY - scrollY) * zoom) + 0.5;
            if (cy >= COL_NUM_HEIGHT && cy <= clientH + 20) {
                ctx.beginPath();
                ctx.moveTo(ROW_NUM_WIDTH, cy);
                ctx.lineTo(ROW_NUM_WIDTH + Math.round(totalGridW * zoom), cy);
                ctx.stroke();
            }
            if (r < maxRows) currentY += (heights[r] || 22);
        }

        let currentX = 0;
        for (let c = 0; c <= maxCols; c++) {
            let cx = ROW_NUM_WIDTH + Math.round((currentX - scrollX) * zoom) + 0.5;
            if (cx >= ROW_NUM_WIDTH && cx <= clientW + 20) {
                ctx.beginPath();
                ctx.moveTo(cx, COL_NUM_HEIGHT);
                ctx.lineTo(cx, COL_NUM_HEIGHT + Math.round(totalGridH * zoom));
                ctx.stroke();
            }
            if (c < maxCols) currentX += (widths[c] || 70);
        }
        ctx.restore();

        // 3. КОНТУРЫ ОБЪЕДИНЕНИЙ
        ctx.save();
        ctx.strokeStyle = "#808080";
        ctx.lineWidth = 1;
        merges.forEach(m => {
            let startRect = getCellRect(m.sr, m.sc);
            let cx = ROW_NUM_WIDTH + (startRect.x - scrollX) * zoom;
            let cy = COL_NUM_HEIGHT + (startRect.y - scrollY) * zoom;
            let fullW = 0; let fullH = 0;
            for (let i = m.sc; i <= m.ec; i++) fullW += (widths[i] || 70);
            for (let i = m.sr; i <= m.er; i++) fullH += (heights[i] || 22);
            let cw = fullW * zoom;
            let ch = fullH * zoom;

            if (cx + cw >= ROW_NUM_WIDTH && cy + ch >= COL_NUM_HEIGHT && cx <= clientW && cy <= clientH) {
                ctx.strokeRect(Math.round(cx) + 0.5, Math.round(cy) + 0.5, Math.round(cw), Math.round(ch));
            }
        });
        ctx.restore();

        // 4. ТЕКСТ
        for (let r = 0; r < maxRows; r++) {
            for (let c = 0; c < maxCols; c++) {
                let lookup = mergeLookup[`${r}_${c}`];
                if (lookup && lookup.isChild) continue; 

                let rect = getCellRect(r, c);
                let cx = ROW_NUM_WIDTH + (rect.x - scrollX) * zoom;
                let cy = COL_NUM_HEIGHT + (rect.y - scrollY) * zoom;
                let cw = rect.w * zoom;
                let ch = rect.h * zoom;

                if (lookup && lookup.isMain) {
                    let fullW = 0; let fullH = 0;
                    for (let i = lookup.m.sc; i <= lookup.m.ec; i++) fullW += (widths[i] || 70);
                    for (let i = lookup.m.sr; i <= lookup.m.er; i++) fullH += (heights[i] || 22);
                    cw = fullW * zoom; ch = fullH * zoom;
                }

                if (cx + cw < ROW_NUM_WIDTH || cy + ch < COL_NUM_HEIGHT || cx > clientW || cy > clientH) continue;

                let cellData = matrix[r] ? matrix[r][c] : null;
                let text = "";
                if (cellData !== null && cellData !== undefined) {
                    text = (typeof cellData === 'object') ? String(cellData.v ?? cellData.value ?? "") : String(cellData);
                }
                
                if (text !== "") {
                    ctx.save();
                    let textColor = (typeof cellData === 'object' && cellData !== null) ? (cellData.color || cellData.textColor || "#000000") : "#000000";
                    ctx.fillStyle = textColor;
                    ctx.font = `${Math.round(11 * zoom)}px Arial`;

                    ctx.beginPath();
                    ctx.rect(cx + 3, cy, cw - 6, ch);
                    ctx.clip(); 
                    ctx.fillText(text, cx + 5, cy + ch / 2);
                    ctx.restore();
                }
            }
        }

        // 5. РАМКА ЛИСТА
        let boundaryX = Math.round(ROW_NUM_WIDTH + (totalGridW - scrollX) * zoom);
        let boundaryY = Math.round(COL_NUM_HEIGHT + (totalGridH - scrollY) * zoom);

        ctx.strokeStyle = "#0f62fe";
        ctx.lineWidth = 2.0;
        if (boundaryX >= ROW_NUM_WIDTH) {
            ctx.beginPath(); ctx.moveTo(boundaryX, COL_NUM_HEIGHT); ctx.lineTo(boundaryX, Math.max(COL_NUM_HEIGHT, boundaryY)); ctx.stroke();
        }
        if (boundaryY >= COL_NUM_HEIGHT) {
            ctx.beginPath(); ctx.moveTo(ROW_NUM_WIDTH, boundaryY); ctx.lineTo(Math.max(ROW_NUM_WIDTH, boundaryX), boundaryY); ctx.stroke();
        }

        // 6. ШАПКА
        ctx.lineWidth = 1;
        for (let c = 0; c < maxCols; c++) {
            let rect = getCellRect(0, c);
            let cx = ROW_NUM_WIDTH + (rect.x - scrollX) * zoom;
            let cw = rect.w * zoom;
            if (cx + cw < ROW_NUM_WIDTH || cx > clientW) continue;
            let rx = Math.round(cx);
            let rw = Math.round(cx + cw) - rx;
            ctx.fillStyle = "#f1f1f1"; ctx.fillRect(rx, 0, rw, COL_NUM_HEIGHT);
            ctx.strokeStyle = "#c0c0c0"; ctx.strokeRect(rx + 0.5, 0.5, rw, COL_NUM_HEIGHT);
            ctx.fillStyle = "#444444"; ctx.font = `bold 10px Arial`; ctx.textAlign = 'center';
            ctx.fillText(getColName(c), rx + rw / 2, COL_NUM_HEIGHT / 2);
        }

        for (let r = 0; r < maxRows; r++) {
            let rect = getCellRect(r, 0);
            let cy = COL_NUM_HEIGHT + (rect.y - scrollY) * zoom;
            let ch = rect.h * zoom;
            if (cy + ch < COL_NUM_HEIGHT || cy > clientH) continue;
            let ry = Math.round(cy);
            let rh = Math.round(cy + ch) - ry;
            ctx.fillStyle = "#f1f1f1"; ctx.fillRect(0, ry, ROW_NUM_WIDTH, rh);
            ctx.strokeStyle = "#c0c0c0"; ctx.strokeRect(0.5, ry + 0.5, ROW_NUM_WIDTH, rh);
            ctx.fillStyle = "#666666"; ctx.font = `bold 9px Arial`; ctx.textAlign = 'center';
            ctx.fillText(r + 1, ROW_NUM_WIDTH / 2, ry + rh / 2);
        }

        ctx.fillStyle = "#f1f1f1"; ctx.fillRect(0, 0, ROW_NUM_WIDTH, COL_NUM_HEIGHT);
        ctx.strokeStyle = "#c0c0c0"; ctx.strokeRect(0.5, 0.5, ROW_NUM_WIDTH, COL_NUM_HEIGHT);

        ctx.restore();
    }

    // Обработка касаний
    canvas.addEventListener('touchstart', (e) => {
        hasMoved = false;
        if (e.touches.length === 1) {
            isDragging = true;
            lastTouchX = e.touches[0].pageX; lastTouchY = e.touches[0].pageY;
        } else if (e.touches.length === 2) {
            isDragging = false;
            startTouchDist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
            startZoom = zoom;
        }
    });

    canvas.addEventListener('touchmove', (e) => {
        if (e.touches.length === 1 && isDragging) {
            let dx = e.touches[0].pageX - lastTouchX;
            let dy = e.touches[0].pageY - lastTouchY;
            if (Math.abs(dx) > 2 || Math.abs(dy) > 2) hasMoved = true;
            scrollX -= dx / zoom; scrollY -= dy / zoom;
            let limits = getScrollLimits();
            scrollX = Math.max(0, Math.min(scrollX, limits.x));
            scrollY = Math.max(0, Math.min(scrollY, limits.y));
            lastTouchX = e.touches[0].pageX; lastTouchY = e.touches[0].pageY;
            if(editor.style.display === 'block') positionEditor();
            draw();
        } else if (e.touches.length === 2) {
            hasMoved = true;
            const dist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
            if (startTouchDist > 0) {
                zoom = Math.max(0.3, Math.min(2.5, startZoom * (dist / startTouchDist)));
                let limits = getScrollLimits();
                scrollX = Math.max(0, Math.min(scrollX, limits.x));
                scrollY = Math.max(0, Math.min(scrollY, limits.y));
                if(editor.style.display === 'block') positionEditor();
                draw();
            }
        }
    });

    canvas.addEventListener('touchend', (e) => {
        isDragging = false;
        startTouchDist = 0;
        if (!hasMoved && e.changedTouches.length > 0) {
            touchHandled = true;
            const rect = canvas.getBoundingClientRect();
            handleGridClick(e.changedTouches[0].clientX - rect.left, e.changedTouches[0].clientY - rect.top);
        }
    });

    canvas.addEventListener('click', (e) => {
        if (touchHandled) { touchHandled = false; return; }
        if (hasMoved) return;
        const rect = canvas.getBoundingClientRect();
        handleGridClick(e.clientX - rect.left, e.clientY - rect.top);
    });

    function handleGridClick(clickX, clickY) {
        // Жесткая отсечка кликов по панели индексов строк и колонок
        if (clickX < ROW_NUM_WIDTH || clickY < COL_NUM_HEIGHT) return;

        let targetX = (clickX - ROW_NUM_WIDTH) / zoom + scrollX;
        let targetY = (clickY - COL_NUM_HEIGHT) / zoom + scrollY;

        let foundR = -1, foundC = -1;
        let cx = 0; for (let c = 0; c < maxCols; c++) { if (targetX >= cx && targetX <= cx + widths[c]) { foundC = c; break; } cx += widths[c]; }
        let cy = 0; for (let r = 0; r < maxRows; r++) { if (targetY >= cy && targetY <= cy + heights[r]) { foundR = r; break; } cy += heights[r]; }

        if (foundR !== -1 && foundC !== -1) {
            let mergeInfo = getMergedCellInfo(foundR, foundC);
            selectedCell = mergeInfo ? { r: mergeInfo.sr, c: mergeInfo.sc } : { r: foundR, c: foundC };
            showEditor();
        }
    }

    function showEditor() {
        if (!selectedCell) return;
        let cellData = matrix[selectedCell.r] ? matrix[selectedCell.r][selectedCell.c] : null;
        let val = "";
        if (cellData !== null) {
            val = (typeof cellData === 'object') ? String(cellData.v ?? cellData.value ?? "") : String(cellData);
        }
        editor.value = val;
        editor.style.display = 'block';
        positionEditor();
        editor.focus();
    }

    function positionEditor() {
        if (!selectedCell) return;
        let rect = getCellRect(selectedCell.r, selectedCell.c);
        let cw = rect.w, ch = rect.h;
        let mergeInfo = getMergedCellInfo(selectedCell.r, selectedCell.c);
        if (mergeInfo && mergeInfo.sr === selectedCell.r && mergeInfo.sc === selectedCell.c) {
            cw = 0; ch = 0;
            for (let i = mergeInfo.sc; i <= mergeInfo.ec; i++) cw += widths[i];
            for (let i = mergeInfo.sr; i <= mergeInfo.er; i++) ch += heights[i];
        }
        
        let leftPos = ROW_NUM_WIDTH + (rect.x - scrollX) * zoom;
        let topPos = COL_NUM_HEIGHT + (rect.y - scrollY) * zoom;

        editor.style.left = leftPos + 'px';
        editor.style.top = topPos + 'px';
        editor.style.width = (cw * zoom) + 'px';
        editor.style.height = (ch * zoom) + 'px';
    }

    editor.addEventListener('blur', () => {
        if (selectedCell && matrix[selectedCell.r]) {
            let newVal = editor.value;
            if (typeof matrix[selectedCell.r][selectedCell.c] === 'object' && matrix[selectedCell.r][selectedCell.c] !== null) {
                matrix[selectedCell.r][selectedCell.c].v = newVal;
            } else {
                matrix[selectedCell.r][selectedCell.c] = newVal;
            }
        }
        editor.style.display = 'none';
        draw();
    });

    // Автоматическое обновление размеров холста при изменении интерфейса (поворот экрана, появление клавиатуры)
    const resizeObserver = new ResizeObserver(() => {
        updateCanvasDimensions();
        draw();
    });
    resizeObserver.observe(canvas);

    window.onload = function() {
        setTimeout(requestDataFromAndroid, 50);
    };
</script>

</body>
</html>
