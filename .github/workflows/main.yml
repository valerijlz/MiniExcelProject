name: Android APK Auto-Compiler

on:
  push:
    branches: [ "main", "master" ] # Запуск сборки при каждом пуше в основные ветки

jobs:
  compiler-job:
    runs-on: ubuntu-latest

    steps:
    - name: Download Source Code
      uses: actions/checkout@v4

    - name: Initialize JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant Execute Rights for Gradle
      run: chmod +x gradlew

    - name: Compile Application (Assemble Debug APK)
      run: ./gradlew assembleDebug

    - name: Save APK to Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: minimal-excel-editor
        path: app/build/outputs/apk/debug/app-debug.apk
